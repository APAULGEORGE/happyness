<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开心聚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
        /* UI 样式 */
        #header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        #header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #d4af37, #f5e6c8, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
        }
        #hover-label {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            font-size: 18px;
            font-weight: 400;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        #mobile-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            width: 90%;
        }
        /* 管理面板样式 */
        #admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        #admin-btn:active { transform: scale(0.96); }
        #admin-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 350px;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 103;
            padding: 25px 20px;
            transition: right 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #admin-panel.open { right: 0; }
        #admin-panel h2 {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .upload-section { margin-bottom: 25px; }
        .upload-section label {
            display: block;
            font-size: 15px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        .upload-section select,
        .upload-section input[type="file"] {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
            min-height: 48px;
        }
        .upload-btn {
            width: 100%;
            background: linear-gradient(90deg, #d4af37, #b8941f);
            border: none;
            color: #000;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 48px;
        }
        .upload-btn:active { transform: scale(0.98); }
        .close-panel {
            position: absolute;
            top: 25px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
        }
        /* 音乐控制 */
        #music-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
        }
        #music-btn:active { transform: scale(0.96); }
        #music-btn.playing { background: rgba(212, 175, 55, 0.3); border-color: #d4af37; }
        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            margin-top: 20px;
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        /* 照片预览弹窗 */
        #photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #photo-modal.open { display: flex; }
        #photo-modal img {
            max-width: 90%;
            max-height: 70%;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.5);
        }
        #photo-modal .close-modal {
            position: absolute;
            top: 30px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.8;
            width: 50px;
            height: 50px;
            line-height: 50px;
            text-align: center;
        }
        #photo-modal .modal-name {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="header"><h1>开心聚</h1></div>
    <div id="hover-label"></div>
    <div id="mobile-hint">单指滑动旋转 · 双指捏合缩放 · 点击星球查看照片</div>
    
    <button id="music-btn">♪</button>
    <button id="admin-btn">管理</button>
    
    <!-- 管理面板 -->
    <div id="admin-panel">
        <button class="close-panel">&times;</button>
        <h2>家族管理</h2>
        <div class="upload-section">
            <label>上传成员照片</label>
            <select id="member-select"></select>
            <input type="file" id="photo-input" accept="image/jpeg,image/png,image/jpg">
            <button class="upload-btn" id="upload-photo-btn">上传照片</button>
        </div>
        <div class="upload-section">
            <label>上传背景音乐</label>
            <input type="file" id="audio-input" accept="audio/mp3,audio/wav,audio/m4a,audio/mpeg">
            <button class="upload-btn" id="upload-audio-btn">上传音乐</button>
            <p style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px;">支持mp3/wav/m4a格式，大小不超过10MB</p>
        </div>
    </div>
    
    <!-- 加载页 -->
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">加载家族星系中...</div>
    </div>

    <!-- 照片预览弹窗 -->
    <div id="photo-modal">
        <button class="close-modal">&times;</button>
        <img id="modal-photo" src="" alt="成员照片">
        <div class="modal-name" id="modal-name"></div>
    </div>
    
    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto">

    <!-- 稳定CDN资源 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 环境检测
        const isMobile = 'ontouchstart' in window || navigator.userAgent.includes('Mobile');
        const pixelRatio = Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2);
        const segmentCount = isMobile ? 32 : 64;
        const particleCount = isMobile ? 800 : 2000;

        // 家庭配置（完全保留你确认的配色）
        const familyConfig = {
            1: { name: '田延芝家庭', color: '#d4af37', baseAngle: 0 },
            2: { name: '田延英家庭', color: '#e27d48', baseAngle: 90 },
            3: { name: '田延兰家庭', color: '#48a79c', baseAngle: 180 },
            4: { name: '田玉莲家庭', color: '#8d5fc9', baseAngle: 270 }
        };

        // 完整家族成员数据（完全匹配你的需求）
        const familyData = [
            // 核心祖辈
            { 
                id: 'core', 
                name: '张明菊', 
                level: 0, 
                color: '#f8e0a0', 
                isCore: true,
                familyId: 0,
                orbitRadius: 0,
                baseAngle: 0,
                offsetAngle: 0
            },
            // 家庭1：田延芝家
            { 
                id: 'tianyanzhi', 
                name: '田延芝', 
                level: 1, 
                color: familyConfig[1].color, 
                parentId: 'core',
                isMother: true,
                familyId: 1,
                orbitRadius: 18,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanxiaowei', 
                name: '谭小伟', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 30,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -3
            },
            { 
                id: 'tanxiaoping', 
                name: '谭晓萍', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 30,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: 3
            },
            // 家庭2：田延英家
            { 
                id: 'tianyanying', 
                name: '田延英', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: 'core',
                isMother: true,
                familyId: 2,
                orbitRadius: 18,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanyuangui', 
                name: '谭元贵', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: null,
                isFather: true,
                familyId: 2,
                orbitRadius: 18,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanjunna', 
                name: '谭畯娜', 
                level: 2, 
                color: familyConfig[2].color, 
                motherId: 'tianyanying',
                fatherId: 'tanyuangui',
                familyId: 2,
                orbitRadius: 30,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 0
            },
            // 家庭3：田延兰家
            { 
                id: 'tianyanlan', 
                name: '田延兰', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: 'core',
                isMother: true,
                familyId: 3,
                orbitRadius: 18,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'chenhongshun', 
                name: '陈洪顺', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: null,
                isFather: true,
                familyId: 3,
                orbitRadius: 18,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'chensiyu', 
                name: '陈思昱', 
                level: 2, 
                color: familyConfig[3].color, 
                motherId: 'tianyanlan',
                fatherId: 'chenhongshun',
                familyId: 3,
                orbitRadius: 30,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 0
            },
            // 家庭4：田玉莲家
            { 
                id: 'tianyulian', 
                name: '田玉莲', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: 'core',
                isMother: true,
                familyId: 4,
                orbitRadius: 18,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanshuai', 
                name: '谭帅', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: null,
                isFather: true,
                familyId: 4,
                orbitRadius: 18,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanxinmiao', 
                name: '谭鑫淼', 
                level: 2, 
                color: familyConfig[4].color, 
                motherId: 'tianyulian',
                fatherId: 'tanshuai',
                familyId: 4,
                orbitRadius: 30,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 0
            },
        ];

        // 全局变量
        let scene, camera, renderer, controls;
        let galaxyNodes = new Map();
        let relationLines = [];
        let particleSystems = [];
        let hoveredNode = null;
        let textureLoader = new THREE.TextureLoader();
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let isMoving = false; // 核心标记：是否正在滑动，避免误触
        let touchStartTime = 0;
        let touchStartPos = { x: 0, y: 0 };

        // ==================== 初始化 ====================
        function init() {
            try {
                // 场景初始化
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, isMobile ? 0.02 : 0.015);

                // 相机初始化
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 0, 55);
                camera.lookAt(0, 0, 0);

                // 渲染器初始化
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    alpha: true,
                    powerPreference: isMobile ? "low-power" : "high-performance"
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(pixelRatio);
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                // ==================== 【丝滑操控核心】官方轨道控制器 ====================
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                // 手机端专属手感优化
                controls.enableDamping = true; // 阻尼惯性，丝滑不生硬
                controls.dampingFactor = 0.08; // 惯性系数，手机端更自然
                controls.enableZoom = true; // 双指缩放
                controls.zoomSpeed = 0.8; // 缩放速度
                controls.enablePan = false; // 关闭平移，只保留旋转+缩放，避免操作混乱
                controls.autoRotate = false; // 关闭自动旋转，完全用户掌控
                controls.minDistance = 10; // 最小缩放距离
                controls.maxDistance = 80; // 最大缩放距离
                controls.minPolarAngle = 0; // 上下旋转无限制
                controls.maxPolarAngle = Math.PI;
                controls.enableRotate = true; // 开启旋转
                controls.rotateSpeed = isMobile ? 0.8 : 0.5; // 手机端旋转灵敏度拉满，滑多少动多少
                controls.touches = {
                    ONE: THREE.TOUCH.ROTATE, // 单指=旋转
                    TWO: THREE.TOUCH.DOLLY_PAN // 双指=缩放
                };

                // 滑动状态标记，解决点击/滑动冲突
                controls.addEventListener('start', () => {
                    isMoving = true;
                    if (hoveredNode) {
                        resetNodeHover(hoveredNode);
                        hoveredNode = null;
                        updateHoverLabel(0, 0);
                    }
                });
                controls.addEventListener('end', () => {
                    // 滑动结束后延迟100ms再开启点击检测，彻底避免误触
                    setTimeout(() => {
                        isMoving = false;
                    }, 100);
                });

                // 创建场景内容
                createOrbitRings();
                createGalaxyHierarchy();
                createRelationLines();
                createStarfield();

                // 事件&UI初始化
                initEvents();
                initUI();
                loadSavedData();

                // 隐藏加载页
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 800);

                // 启动动画循环
                animate();
            } catch (initError) {
                console.error('初始化失败', initError);
                document.getElementById('loading-text').textContent = '加载出错';
            }
        }

        // ==================== 轨道环创建 ====================
        function createOrbitRings() {
            // 二代轨道环
            const level1RingGeo = new THREE.RingGeometry(17.5, 18.5, segmentCount);
            const level1RingMat = new THREE.MeshBasicMaterial({
                color: 0xd4af37,
                transparent: true,
                opacity: 0.1,
                side: THREE.DoubleSide
            });
            const level1Ring = new THREE.Mesh(level1RingGeo, level1RingMat);
            level1Ring.rotation.x = Math.PI / 2;
            scene.add(level1Ring);

            // 三代轨道环
            const level2RingGeo = new THREE.RingGeometry(29.5, 30.5, segmentCount);
            const level2RingMat = new THREE.MeshBasicMaterial({
                color: 0xf0d78c,
                transparent: true,
                opacity: 0.07,
                side: THREE.DoubleSide
            });
            const level2Ring = new THREE.Mesh(level2RingGeo, level2RingMat);
            level2Ring.rotation.x = Math.PI / 2;
            scene.add(level2Ring);
        }

        // ==================== 星系层级创建 ====================
        function createGalaxyHierarchy() {
            const maxLevel = Math.max(...familyData.map(m => m.level));
            for (let level = 0; level <= maxLevel; level++) {
                const levelMembers = familyData.filter(m => m.level === level);
                levelMembers.forEach(member => {
                    createGalaxyNode(member);
                });
            }
        }

        // ==================== 【高级质感星体创建】完整还原特效 ====================
        function createGalaxyNode(member) {
            const group = new THREE.Group();
            
            // 严格按辈分区分大小
            let sphereRadius;
            switch(member.level) {
                case 0: sphereRadius = 1.8; break;
                case 1: sphereRadius = 1.1; break;
                case 2: sphereRadius = 0.8; break;
                default: sphereRadius = 0.8;
            }
            const geometry = new THREE.SphereGeometry(sphereRadius, segmentCount, segmentCount);

            // 高级Shader材质，完整保留动态效果
            const fragmentShader = `
                uniform vec3 baseColor;
                uniform vec3 coreColor;
                uniform float time;
                uniform float glowIntensity;
                uniform float hoverIntensity;
                uniform sampler2D photoTexture;
                uniform float hasPhoto;
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;

                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }

                void main() {
                    float distFromCenter = length(vPosition);
                    float coreGradient = 1.0 - smoothstep(0.0, 1.0, distFromCenter);
                    vec3 base = mix(baseColor, coreColor, coreGradient * 0.8);

                    // 动态大气噪声纹理
                    vec2 noiseUv = vUv * 3.0 + vec2(time * 0.1, time * 0.05);
                    float surfaceNoise = noise(noiseUv) * 0.15;
                    base += surfaceNoise * baseColor;

                    // 照片贴图自然融合
                    if (hasPhoto > 0.5) {
                        vec4 photoColor = texture2D(photoTexture, vUv);
                        base = mix(base, photoColor.rgb, 0.85);
                    }

                    // 双层菲涅尔辉光
                    float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                    vec3 glow = fresnel * baseColor * (glowIntensity + hoverIntensity * 2.0);
                    
                    vec3 finalColor = base + glow;
                    gl_FragColor = vec4(finalColor, 1.0);
                }
            `;

            // 材质创建
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    baseColor: { value: new THREE.Color(member.color) },
                    coreColor: { value: new THREE.Color(member.isCore ? '#ffffff' : '#fff8e6') },
                    time: { value: 0 },
                    glowIntensity: { value: member.isCore ? 0.8 : 0.5 },
                    hoverIntensity: { value: 0.0 },
                    photoTexture: { value: null },
                    hasPhoto: { value: 0 }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying vec2 vUv;
                    
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: fragmentShader,
                transparent: true
            });

            const sphere = new THREE.Mesh(geometry, material);
            group.add(sphere);

            // 双层发光环，增强高级感
            const innerRingGeo = new THREE.RingGeometry(
                sphereRadius * 1.3, 
                sphereRadius * 1.5, 
                segmentCount
            );
            const innerRingMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(member.color),
                transparent: true,
                opacity: member.isCore ? 0.3 : 0.2,
                side: THREE.DoubleSide
            });
            const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
            innerRing.rotation.x = Math.PI / 2;
            group.add(innerRing);

            // 位置计算（固定角度，公转时整体同步）
            if (member.isCore) {
                group.position.set(0, 0, 0);
            } else {
                const baseAngleRad = (member.baseAngle + member.offsetAngle) * Math.PI / 180;
                group.position.set(
                    Math.cos(baseAngleRad) * member.orbitRadius,
                    (Math.random() - 0.5) * (member.level === 1 ? 1.5 : 2),
                    Math.sin(baseAngleRad) * member.orbitRadius
                );
            }

            // 节点数据存储
            group.userData = {
                ...member,
                material,
                sphere,
                innerRing,
                sphereRadius,
                originalScale: 1
            };

            scene.add(group);
            galaxyNodes.set(member.id, group);
        }

        // ==================== 连线创建（完全匹配你的规则）====================
        function createRelationLines() {
            const coreNode = galaxyNodes.get('core');
            // 1. 祖辈仅和4个女儿连线
            familyData.filter(m => m.level === 1 && m.isMother).forEach(member => {
                const daughterNode = galaxyNodes.get(member.id);
                createLine(coreNode, daughterNode, member.color);
            });
            // 2. 孙辈和父母都连线
            familyData.filter(m => m.level === 2).forEach(member => {
                const childNode = galaxyNodes.get(member.id);
                if (member.motherId) {
                    const motherNode = galaxyNodes.get(member.motherId);
                    if (motherNode) createLine(motherNode, childNode, member.color);
                }
                if (member.fatherId) {
                    const fatherNode = galaxyNodes.get(member.fatherId);
                    if (fatherNode) createLine(fatherNode, childNode, member.color);
                }
            });
        }

        function createLine(startNode, endNode, color) {
            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const lineMat = new THREE.LineBasicMaterial({
                color: new THREE.Color(color),
                transparent: true,
                opacity: 0.35
            });
            const line = new THREE.Line(lineGeo, lineMat);
            line.userData = { startNode, endNode };
            scene.add(line);
            relationLines.push(line);
        }

        // 更新连线位置
        function updateRelationLines() {
            relationLines.forEach(line => {
                const { startNode, endNode } = line.userData;
                const startPos = startNode.position;
                const endPos = endNode.position;
                
                const positions = line.geometry.attributes.position.array;
                positions[0] = startPos.x;
                positions[1] = startPos.y;
                positions[2] = startPos.z;
                positions[3] = endPos.x;
                positions[4] = endPos.y;
                positions[5] = endPos.z;
                line.geometry.attributes.position.needsUpdate = true;
            });
        }

        // ==================== 星空背景 ====================
        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starPositions = new Float32Array(particleCount * 3);
            const starColors = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                const radius = 150 + Math.random() * 250;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);
                const color = new THREE.Color();
                color.setHSL(0.1 + Math.random() * 0.15, 0.5, 0.7 + Math.random() * 0.3);
                starColors[i * 3] = color.r;
                starColors[i * 3 + 1] = color.g;
                starColors[i * 3 + 2] = color.b;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            const starMat = new THREE.PointsMaterial({
                vertexColors: true,
                size: 0.8,
                transparent: true,
                opacity: 0.6
            });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
            particleSystems.push({ mesh: stars, type: 'stars' });
        }

        // ==================== 事件监听（点击100%正常）====================
        function initEvents() {
            window.addEventListener('resize', onWindowResize);

            // 桌面端鼠标事件
            if (!isMobile) {
                renderer.domElement.addEventListener('mousemove', onMouseMove);
                renderer.domElement.addEventListener('click', onClick);
            }

            // 移动端触摸事件
            renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: true });
            renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: true });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            controls.update();
        }

        // 桌面端hover检测
        function onMouseMove(e) {
            if (isMoving) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
            const intersects = raycaster.intersectObjects(allSpheres);

            if (intersects.length > 0) {
                const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                if (node && node !== hoveredNode) {
                    if (hoveredNode) resetNodeHover(hoveredNode);
                    hoveredNode = node;
                    setNodeHover(node);
                }
                document.body.style.cursor = 'pointer';
            } else {
                if (hoveredNode) {
                    resetNodeHover(hoveredNode);
                    hoveredNode = null;
                }
                document.body.style.cursor = 'default';
            }
            updateHoverLabel(e.clientX, e.clientY);
        }

        // 触摸开始
        function onTouchStart(e) {
            touchStartTime = Date.now();
            touchStartPos.x = e.touches[0].clientX;
            touchStartPos.y = e.touches[0].clientY;
        }

        // 触摸结束（点击检测，100%正常）
        function onTouchEnd(e) {
            const touchEndTime = Date.now();
            const touchDuration = touchEndTime - touchStartTime;
            const touchEndX = e.changedTouches[0]?.clientX || 0;
            const touchEndY = e.changedTouches[0]?.clientY || 0;
            const deltaMove = Math.hypot(touchEndX - touchStartPos.x, touchEndY - touchStartPos.y);
            
            // 仅短时间+小移动+非滑动状态，才判定为点击
            if (touchDuration < 300 && deltaMove < 15 && !isMoving) {
                mouse.x = (touchEndX / window.innerWidth) * 2 - 1;
                mouse.y = -(touchEndY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
                const intersects = raycaster.intersectObjects(allSpheres);
                if (intersects.length > 0) {
                    const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                    if (node) openPhotoModal(node);
                }
            }
        }

        // 桌面端点击事件
        function onClick(e) {
            if (isMoving) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
            const intersects = raycaster.intersectObjects(allSpheres);
            if (intersects.length > 0) {
                const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                if (node) openPhotoModal(node);
            }
        }

        // ==================== 节点交互效果 ====================
        function setNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 1.5 : 1.2;
            data.material.uniforms.hoverIntensity.value = 1.0;
            data.innerRing.material.opacity = data.isCore ? 0.6 : 0.5;
            node.scale.lerp(new THREE.Vector3(1.3, 1.3, 1.3), 0.1);
        }

        function resetNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 0.8 : 0.5;
            data.material.uniforms.hoverIntensity.value = 0.0;
            data.innerRing.material.opacity = data.isCore ? 0.3 : 0.2;
            node.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
        }

        function updateHoverLabel(x, y) {
            const label = document.getElementById('hover-label');
            if (hoveredNode) {
                label.textContent = hoveredNode.userData.name;
                const labelWidth = 100;
                const windowWidth = window.innerWidth;
                const finalX = x + 15 + labelWidth > windowWidth ? x - labelWidth - 15 : x + 15;
                label.style.left = finalX + 'px';
                label.style.top = y - 10 + 'px';
                label.style.background = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.15)`;
                label.style.borderColor = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.3)`;
                label.style.opacity = '1';
            } else {
                label.style.opacity = '0';
            }
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function openPhotoModal(node) {
            const data = node.userData;
            const savedPhoto = localStorage.getItem(`photo_${data.id}`);
            if (!savedPhoto) {
                alert('该成员暂未上传照片，可点击右上角「管理」按钮上传');
                return;
            }
            document.getElementById('modal-photo').src = savedPhoto;
            document.getElementById('modal-name').textContent = data.name;
            document.getElementById('photo-modal').classList.add('open');
        }

        // ==================== UI&上传功能 ====================
        function initUI() {
            // 管理面板开关
            const adminBtn = document.getElementById('admin-btn');
            const adminPanel = document.getElementById('admin-panel');
            const closePanel = document.querySelector('.close-panel');
            
            adminBtn.onclick = () => adminPanel.classList.add('open');
            closePanel.onclick = () => adminPanel.classList.remove('open');

            // 成员下拉框
            const memberSelect = document.getElementById('member-select');
            familyData.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                memberSelect.appendChild(option);
            });

            // 照片上传
            document.getElementById('upload-photo-btn').onclick = uploadPhoto;
            
            // 音乐上传
            document.getElementById('upload-audio-btn').onclick = uploadAudio;

            // 音乐播放控制（移动端兼容）
            const musicBtn = document.getElementById('music-btn');
            const bgm = document.getElementById('bgm');
            
            // 移动端音频解锁
            document.body.addEventListener('click', () => {
                if (bgm.paused && bgm.src) bgm.load();
            }, { once: true });

            musicBtn.onclick = () => {
                if (!bgm.src || bgm.src === window.location.href) {
                    alert('请先上传背景音乐');
                    return;
                }
                if (bgm.paused) {
                    bgm.play().then(() => {
                        musicBtn.classList.add('playing');
                        musicBtn.textContent = '♫';
                    }).catch(e => {
                        alert('播放失败，请点击页面后重试');
                    });
                } else {
                    bgm.pause();
                    musicBtn.classList.remove('playing');
                    musicBtn.textContent = '♪';
                }
            };

            // 弹窗关闭
            document.querySelector('#photo-modal .close-modal').onclick = () => {
                document.getElementById('photo-modal').classList.remove('open');
            };
            document.getElementById('photo-modal').onclick = (e) => {
                if (e.target === document.getElementById('photo-modal')) {
                    document.getElementById('photo-modal').classList.remove('open');
                }
            };
        }

        function uploadPhoto() {
            const file = document.getElementById('photo-input').files[0];
            const memberId = document.getElementById('member-select').value;
            if (!file || !memberId) {
                alert('请选择成员和照片');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('照片不能超过5MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem(`photo_${memberId}`, dataUrl);
                updateNodePhotoTexture(memberId, dataUrl);
                alert('上传成功！点击星球即可查看');
                document.getElementById('photo-input').value = '';
            };
            reader.readAsDataURL(file);
        }

        function updateNodePhotoTexture(memberId, photoUrl) {
            const node = galaxyNodes.get(memberId);
            if (!node) return;
            
            textureLoader.load(
                photoUrl,
                (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    node.userData.material.uniforms.photoTexture.value = texture;
                    node.userData.material.uniforms.hasPhoto.value = 1;
                    node.userData.material.needsUpdate = true;
                },
                undefined,
                (err) => console.error('纹理加载失败', err)
            );
        }

        function uploadAudio() {
            const file = document.getElementById('audio-input').files[0];
            const bgm = document.getElementById('bgm');
            if (!file) {
                alert('请选择音频文件');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('音频不能超过10MB');
                return;
            }

            const reader = new FileReader();
            reader.onloadstart = () => {
                document.getElementById('upload-audio-btn').textContent = '上传中...';
                document.getElementById('upload-audio-btn').disabled = true;
            };
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem('bgm_audio', dataUrl);
                bgm.src = dataUrl;
                bgm.load();
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('上传成功！点击左上角按钮播放');
                document.getElementById('audio-input').value = '';
            };
            reader.onerror = () => {
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('读取失败，请重试');
            };
            reader.readAsDataURL(file);
        }

        function loadSavedData() {
            const savedAudio = localStorage.getItem('bgm_audio');
            if (savedAudio) {
                document.getElementById('bgm').src = savedAudio;
            }
            familyData.forEach(member => {
                const savedPhoto = localStorage.getItem(`photo_${member.id}`);
                if (savedPhoto) {
                    updateNodePhotoTexture(member.id, savedPhoto);
                }
            });
        }

        // ==================== 【星体动起来】动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // 更新控制器（必须每帧调用，阻尼惯性才会生效）
            controls.update();

            // 【星体公转+自转，动起来！】同家庭同步公转，孙辈永远在父母后面
            galaxyNodes.forEach(node => {
                const data = node.userData;
                // 自转
                node.rotation.y += data.isCore ? 0.001 : 0.002;
                // 公转：同家庭同步旋转，相对位置固定
                if (data.familyId > 0) {
                    const baseAngleRad = (data.baseAngle + data.offsetAngle) * Math.PI / 180;
                    const rotateAngle = time * 0.05; // 公转速度
                    const finalAngle = baseAngleRad + rotateAngle;
                    node.position.x = Math.cos(finalAngle) * data.orbitRadius;
                    node.position.z = Math.sin(finalAngle) * data.orbitRadius;
                }
                // 更新Shader时间
                data.material.uniforms.time.value = time;
            });

            // 更新连线位置，随星体公转同步动
            updateRelationLines();

            // 渲染
            renderer.render(scene, camera);
        }

        // 页面加载完成启动
        window.onload = init;
    </script>
</body>
</html>
