<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开心聚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* UI 样式 */
        #header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        #header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #d4af37, #f5e6c8, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #hover-label {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            font-size: 18px;
            font-weight: 400;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        #mobile-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-align: center;
            width: 90%;
        }
        /* 管理面板样式 */
        #admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            padding: 10px 18px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
            min-height: 44px;
        }
        #admin-btn:active { transform: scale(0.96); }
        #admin-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 350px;
            height: 100%;
            background: rgba(0,0,0,0.96);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 103;
            padding: 25px 20px;
            transition: right 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #admin-panel.open { right: 0; }
        #admin-panel h2 {
            font-size: 20px;
            font-weight: 400;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .upload-section { margin-bottom: 25px; }
        .upload-section label {
            display: block;
            font-size: 15px;
            color: rgba(255,255,255,0.8);
            margin-bottom: 10px;
        }
        .upload-section select,
        .upload-section input[type="file"] {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
            margin-bottom: 12px;
            min-height: 48px;
        }
        .upload-btn {
            width: 100%;
            background: linear-gradient(90deg, #d4af37, #b8941f);
            border: none;
            color: #000;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 48px;
        }
        .upload-btn:active { transform: scale(0.98); }
        .close-panel {
            position: absolute;
            top: 25px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
            opacity: 0.7;
            width: 40px;
            height: 40px;
            line-height: 40px;
            text-align: center;
        }
        /* 音乐控制 */
        #music-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            color: #fff;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.2s ease;
        }
        #music-btn:active { transform: scale(0.96); }
        #music-btn.playing { background: rgba(212, 175, 55, 0.3); border-color: #d4af37; }
        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.3s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 45px;
            height: 45px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            margin-top: 20px;
            font-size: 15px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        /* 照片预览弹窗 */
        #photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #photo-modal.open { display: flex; }
        #photo-modal img {
            max-width: 90%;
            max-height: 70%;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.5);
        }
        #photo-modal .close-modal {
            position: absolute;
            top: 30px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            opacity: 0.8;
            width: 50px;
            height: 50px;
            line-height: 50px;
            text-align: center;
        }
        #photo-modal .modal-name {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            width: 90%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="header"><h1>开心聚</h1></div>
    <div id="hover-label"></div>
    <div id="mobile-hint">单指旋转 · 双指缩放 · 点击星球查看照片</div>
    
    <button id="music-btn">♪</button>
    <button id="admin-btn">管理</button>
    
    <!-- 管理面板 -->
    <div id="admin-panel">
        <button class="close-panel">&times;</button>
        <h2>家族管理</h2>
        <div class="upload-section">
            <label>上传成员照片</label>
            <select id="member-select"></select>
            <input type="file" id="photo-input" accept="image/jpeg,image/png,image/jpg">
            <button class="upload-btn" id="upload-photo-btn">上传照片</button>
        </div>
        <div class="upload-section">
            <label>上传背景音乐</label>
            <input type="file" id="audio-input" accept="audio/mp3,audio/wav,audio/m4a,audio/mpeg">
            <button class="upload-btn" id="upload-audio-btn">上传音乐</button>
            <p style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px;">支持mp3/wav/m4a格式，大小不超过10MB</p>
        </div>
    </div>
    
    <!-- 加载页 -->
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">加载家族星系中...</div>
    </div>

    <!-- 照片预览弹窗 -->
    <div id="photo-modal">
        <button class="close-modal">&times;</button>
        <img id="modal-photo" src="" alt="成员照片">
        <div class="modal-name" id="modal-name"></div>
    </div>
    
    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto">

    <!-- 稳定CDN资源 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 环境检测
        const isMobile = /Mobile|Android|iPhone|iPad/.test(navigator.userAgent);
        const pixelRatio = Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2);
        const segmentCount = isMobile ? 32 : 128;
        const particleCount = isMobile ? 800 : 2000;

        // 家庭配置（保留原配色）
        const familyConfig = {
            1: { name: '田延芝家庭', color: '#d4af37', baseAngle: 0 },
            2: { name: '田延英家庭', color: '#e27d48', baseAngle: 90 },
            3: { name: '田延兰家庭', color: '#48a79c', baseAngle: 180 },
            4: { name: '田玉莲家庭', color: '#8d5fc9', baseAngle: 270 }
        };

        // 家族成员数据（完全保留原布局）
        const familyData = [
            // 核心祖辈
            { 
                id: 'core', 
                name: '张明菊', 
                level: 0, 
                color: '#f8e0a0', 
                isCore: true,
                familyId: 0,
                orbitRadius: 0,
                baseAngle: 0
            },
            // 家庭1：田延芝家
            { 
                id: 'tianyanzhi', 
                name: '田延芝', 
                level: 1, 
                color: familyConfig[1].color, 
                parentId: 'core',
                isMother: true,
                familyId: 1,
                orbitRadius: 18,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanxiaowei', 
                name: '谭小伟', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 30,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -3
            },
            { 
                id: 'tanxiaoping', 
                name: '谭晓萍', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 30,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: 3
            },
            // 家庭2：田延英家
            { 
                id: 'tianyanying', 
                name: '田延英', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: 'core',
                isMother: true,
                familyId: 2,
                orbitRadius: 18,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanyuangui', 
                name: '谭元贵', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: null,
                isFather: true,
                familyId: 2,
                orbitRadius: 18,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanjunna', 
                name: '谭畯娜', 
                level: 2, 
                color: familyConfig[2].color, 
                motherId: 'tianyanying',
                fatherId: 'tanyuangui',
                familyId: 2,
                orbitRadius: 30,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 0
            },
            // 家庭3：田延兰家
            { 
                id: 'tianyanlan', 
                name: '田延兰', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: 'core',
                isMother: true,
                familyId: 3,
                orbitRadius: 18,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'chenhongshun', 
                name: '陈洪顺', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: null,
                isFather: true,
                familyId: 3,
                orbitRadius: 18,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'chensiyu', 
                name: '陈思昱', 
                level: 2, 
                color: familyConfig[3].color, 
                motherId: 'tianyanlan',
                fatherId: 'chenhongshun',
                familyId: 3,
                orbitRadius: 30,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 0
            },
            // 家庭4：田玉莲家
            { 
                id: 'tianyulian', 
                name: '田玉莲', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: 'core',
                isMother: true,
                familyId: 4,
                orbitRadius: 18,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanshuai', 
                name: '谭帅', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: null,
                isFather: true,
                familyId: 4,
                orbitRadius: 18,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanxinmiao', 
                name: '谭鑫淼', 
                level: 2, 
                color: familyConfig[4].color, 
                motherId: 'tianyulian',
                fatherId: 'tanshuai',
                familyId: 4,
                orbitRadius: 30,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 0
            },
        ];

        // 全局变量
        let scene, camera, renderer, controls;
        let galaxyNodes = new Map();
        let relationLines = [];
        let orbitRings = [];
        let orbitParticles = [];
        let particleSystems = [];
        let hoveredNode = null;
        let textureLoader = new THREE.TextureLoader();
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let isMoving = false;

        // ==================== 初始化 ====================
        function init() {
            try {
                // 场景&相机&渲染器
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, isMobile ? 0.02 : 0.015);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.set(0, 0, 55);
                camera.lookAt(0, 0, 0);

                renderer = new THREE.WebGLRenderer({ 
                    antialias: !isMobile,
                    alpha: true,
                    powerPreference: isMobile ? "low-power" : "high-performance"
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(pixelRatio);
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                // ==================== 丝滑触控（完全保留）====================
                controls = new THREE.OrbitControls(camera, renderer.domElement);
                controls.enableDamping = true;
                controls.dampingFactor = 0.08;
                controls.rotateSpeed = 0.8;
                controls.zoomSpeed = 0.8;
                controls.enablePan = false;
                controls.minDistance = 12;
                controls.maxDistance = 70;
                controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

                // 滑动状态标记，避免误触
                controls.addEventListener('start', () => {
                    isMoving = true;
                    if (hoveredNode) {
                        resetNodeHover(hoveredNode);
                        hoveredNode = null;
                        updateHoverLabel(0, 0);
                    }
                });
                controls.addEventListener('end', () => {
                    setTimeout(() => { isMoving = false; }, 100);
                });

                // ==================== 核心内容创建 ====================
                createAdvancedOrbitRings(); // 【重点优化】高级动态轨道环
                createGalaxyNodes(); // 带高级特效的星体
                createRelationLines(); // 亲属连线
                createStarfield(); // 背景星空
                createOrbitFlowParticles(); // 轨道流动光点

                // 事件&UI初始化
                initEvents();
                initUI();
                loadSavedData();

                // 隐藏加载页
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 800);

                // 启动动画循环
                animate();
            } catch (e) {
                console.error('初始化失败', e);
                document.getElementById('loading-text').textContent = '加载失败';
            }
        }

        // ==================== 【重点优化】高级动态轨道环 ====================
        function createAdvancedOrbitRings() {
            // ========== 第二圈（二代）高级轨道环 ==========
            // 内层亮线环
            const innerRingGeo = new THREE.RingGeometry(17.8, 18.2, 256);
            const innerRingMat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color1: { value: new THREE.Color(familyConfig[1].color) },
                    color2: { value: new THREE.Color(familyConfig[2].color) },
                    color3: { value: new THREE.Color(familyConfig[3].color) },
                    color4: { value: new THREE.Color(familyConfig[4].color) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vUv = uv;
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec3 color1;
                    uniform vec3 color2;
                    uniform vec3 color3;
                    uniform vec3 color4;
                    varying vec2 vUv;

                    // 噪声函数
                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }

                    void main() {
                        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
                        float normalizedAngle = (angle + 3.1415926) / (2.0 * 3.1415926);
                        
                        // 4个家庭分色渐变
                        vec3 finalColor;
                        if (normalizedAngle < 0.25) {
                            finalColor = mix(color1, color2, normalizedAngle * 4.0);
                        } else if (normalizedAngle < 0.5) {
                            finalColor = mix(color2, color3, (normalizedAngle - 0.25) * 4.0);
                        } else if (normalizedAngle < 0.75) {
                            finalColor = mix(color3, color4, (normalizedAngle - 0.5) * 4.0);
                        } else {
                            finalColor = mix(color4, color1, (normalizedAngle - 0.75) * 4.0);
                        }

                        // 动态流动噪声
                        float n = noise(vec2(normalizedAngle * 10.0, time * 0.5));
                        float alpha = smoothstep(0.4, 0.6, vUv.y) * (0.6 + n * 0.4);
                        
                        // 断点效果，模拟星环
                        float breakMask = sin(normalizedAngle * 20.0 + time) * 0.5 + 0.5;
                        alpha *= breakMask * 0.8 + 0.2;

                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
            innerRing.rotation.x = Math.PI / 2;
            scene.add(innerRing);
            orbitRings.push({ mesh: innerRing, material: innerRingMat });

            // 外层辉光环
            const outerRingGeo = new THREE.RingGeometry(17, 19, 256);
            const outerRingMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    varying vec2 vUv;
                    void main() {
                        float centerDist = abs(vUv.y - 0.5);
                        float alpha = 1.0 - smoothstep(0.0, 0.5, centerDist);
                        alpha *= 0.15 + sin(time * 0.5) * 0.05;
                        gl_FragColor = vec4(0.9, 0.8, 0.6, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
            outerRing.rotation.x = Math.PI / 2;
            scene.add(outerRing);
            orbitRings.push({ mesh: outerRing, material: outerRingMat });

            // ========== 第三圈（三代）高级轨道环 ==========
            // 内层亮线环
            const innerRing2Geo = new THREE.RingGeometry(29.8, 30.2, 256);
            const innerRing2Mat = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    color1: { value: new THREE.Color(familyConfig[1].color) },
                    color2: { value: new THREE.Color(familyConfig[2].color) },
                    color3: { value: new THREE.Color(familyConfig[3].color) },
                    color4: { value: new THREE.Color(familyConfig[4].color) }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec3 color1;
                    uniform vec3 color2;
                    uniform vec3 color3;
                    uniform vec3 color4;
                    varying vec2 vUv;

                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }

                    void main() {
                        float angle = atan(vUv.y - 0.5, vUv.x - 0.5);
                        float normalizedAngle = (angle + 3.1415926) / (2.0 * 3.1415926);
                        
                        vec3 finalColor;
                        if (normalizedAngle < 0.25) {
                            finalColor = mix(color1, color2, normalizedAngle * 4.0);
                        } else if (normalizedAngle < 0.5) {
                            finalColor = mix(color2, color3, (normalizedAngle - 0.25) * 4.0);
                        } else if (normalizedAngle < 0.75) {
                            finalColor = mix(color3, color4, (normalizedAngle - 0.5) * 4.0);
                        } else {
                            finalColor = mix(color4, color1, (normalizedAngle - 0.75) * 4.0);
                        }

                        float n = noise(vec2(normalizedAngle * 8.0, time * 0.3));
                        float alpha = smoothstep(0.4, 0.6, vUv.y) * (0.4 + n * 0.3);
                        float breakMask = sin(normalizedAngle * 16.0 + time * 0.8) * 0.5 + 0.5;
                        alpha *= breakMask * 0.7 + 0.3;

                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const innerRing2 = new THREE.Mesh(innerRing2Geo, innerRing2Mat);
            innerRing2.rotation.x = Math.PI / 2;
            scene.add(innerRing2);
            orbitRings.push({ mesh: innerRing2, material: innerRing2Mat });

            // 外层辉光环
            const outerRing2Geo = new THREE.RingGeometry(29, 31, 256);
            const outerRing2Mat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    varying vec2 vUv;
                    void main() {
                        float centerDist = abs(vUv.y - 0.5);
                        float alpha = 1.0 - smoothstep(0.0, 0.5, centerDist);
                        alpha *= 0.1 + sin(time * 0.6) * 0.04;
                        gl_FragColor = vec4(0.8, 0.7, 0.5, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const outerRing2 = new THREE.Mesh(outerRing2Geo, outerRing2Mat);
            outerRing2.rotation.x = Math.PI / 2;
            scene.add(outerRing2);
            orbitRings.push({ mesh: outerRing2, material: outerRing2Mat });
        }

        // ==================== 轨道流动光点特效 ====================
        function createOrbitFlowParticles() {
            // 二代轨道流动光点
            const orbit1ParticleCount = 40;
            const orbit1Geo = new THREE.BufferGeometry();
            const orbit1Positions = new Float32Array(orbit1ParticleCount * 3);
            const orbit1Colors = new Float32Array(orbit1ParticleCount * 3);
            const orbit1Speeds = new Float32Array(orbit1ParticleCount);

            for (let i = 0; i < orbit1ParticleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 18 + (Math.random() - 0.5) * 0.5;
                orbit1Positions[i * 3] = Math.cos(angle) * radius;
                orbit1Positions[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
                orbit1Positions[i * 3 + 2] = Math.sin(angle) * radius;

                const familyId = Math.floor(i / 10) + 1;
                const color = new THREE.Color(familyConfig[familyId].color);
                orbit1Colors[i * 3] = color.r;
                orbit1Colors[i * 3 + 1] = color.g;
                orbit1Colors[i * 3 + 2] = color.b;

                orbit1Speeds[i] = 0.002 + Math.random() * 0.003;
            }

            orbit1Geo.setAttribute('position', new THREE.BufferAttribute(orbit1Positions, 3));
            orbit1Geo.setAttribute('color', new THREE.BufferAttribute(orbit1Colors, 3));
            const orbit1Mat = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            const orbit1Particles = new THREE.Points(orbit1Geo, orbit1Mat);
            scene.add(orbit1Particles);
            orbitParticles.push({ mesh: orbit1Particles, speeds: orbit1Speeds, radius: 18 });

            // 三代轨道流动光点
            const orbit2ParticleCount = 30;
            const orbit2Geo = new THREE.BufferGeometry();
            const orbit2Positions = new Float32Array(orbit2ParticleCount * 3);
            const orbit2Colors = new Float32Array(orbit2ParticleCount * 3);
            const orbit2Speeds = new Float32Array(orbit2ParticleCount);

            for (let i = 0; i < orbit2ParticleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 30 + (Math.random() - 0.5) * 0.5;
                orbit2Positions[i * 3] = Math.cos(angle) * radius;
                orbit2Positions[i * 3 + 1] = (Math.random() - 0.5) * 0.5;
                orbit2Positions[i * 3 + 2] = Math.sin(angle) * radius;

                const familyId = Math.floor(i / 7.5) + 1;
                const color = new THREE.Color(familyConfig[familyId].color);
                orbit2Colors[i * 3] = color.r;
                orbit2Colors[i * 3 + 1] = color.g;
                orbit2Colors[i * 3 + 2] = color.b;

                orbit2Speeds[i] = 0.0015 + Math.random() * 0.002;
            }

            orbit2Geo.setAttribute('position', new THREE.BufferAttribute(orbit2Positions, 3));
            orbit2Geo.setAttribute('color', new THREE.BufferAttribute(orbit2Colors, 3));
            const orbit2Mat = new THREE.PointsMaterial({
                size: 0.12,
                vertexColors: true,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            const orbit2Particles = new THREE.Points(orbit2Geo, orbit2Mat);
            scene.add(orbit2Particles);
            orbitParticles.push({ mesh: orbit2Particles, speeds: orbit2Speeds, radius: 30 });
        }

        // ==================== 带高级特效的星体创建 ====================
        function createGalaxyNodes() {
            familyData.forEach(member => {
                const group = new THREE.Group();
                
                // 按辈分区分大小
                let sphereRadius;
                switch(member.level) {
                    case 0: sphereRadius = 1.8; break;
                    case 1: sphereRadius = 1.1; break;
                    case 2: sphereRadius = 0.8; break;
                    default: sphereRadius = 0.8;
                }
                const geometry = new THREE.SphereGeometry(sphereRadius, segmentCount, segmentCount);

                // 高级星体Shader（移动端优化）
                const fragmentShader = isMobile ? `
                    uniform vec3 baseColor;
                    uniform vec3 coreColor;
                    uniform float glowIntensity;
                    uniform float hoverIntensity;
                    uniform sampler2D photoTexture;
                    uniform float hasPhoto;
                    varying vec3 vNormal;
                    varying vec2 vUv;

                    void main() {
                        float fresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                        vec3 finalColor = mix(baseColor, coreColor, 0.6);

                        if (hasPhoto > 0.5) {
                            vec4 photoColor = texture2D(photoTexture, vUv);
                            finalColor = mix(finalColor, photoColor.rgb, 0.85);
                        }

                        finalColor += fresnel * baseColor * (glowIntensity + hoverIntensity);
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                ` : `
                    uniform vec3 baseColor;
                    uniform vec3 coreColor;
                    uniform float time;
                    uniform float glowIntensity;
                    uniform float hoverIntensity;
                    uniform sampler2D photoTexture;
                    uniform float hasPhoto;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying vec2 vUv;

                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }

                    void main() {
                        float distFromCenter = length(vPosition);
                        float coreGradient = 1.0 - smoothstep(0.0, 1.0, distFromCenter);
                        vec3 base = mix(baseColor, coreColor, coreGradient * 0.8);

                        // 动态大气噪声纹理
                        vec2 noiseUv = vUv * 3.0 + vec2(time * 0.1, time * 0.05);
                        float surfaceNoise = noise(noiseUv) * 0.15;
                        base += surfaceNoise * baseColor;

                        // 照片贴图自然融合
                        if (hasPhoto > 0.5) {
                            vec4 photoColor = texture2D(photoTexture, vUv);
                            base = mix(base, photoColor.rgb, 0.85);
                        }

                        // 双层菲涅尔辉光
                        float innerFresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 1.2);
                        float outerFresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 0.6);
                        vec3 fresnelGlow = innerFresnel * coreColor * (1.0 + hoverIntensity * 2.0);
                        vec3 outerGlow = outerFresnel * baseColor * (glowIntensity + hoverIntensity * 2.0);
                        
                        vec3 finalColor = base + fresnelGlow + outerGlow;
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `;

                // 材质创建
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        baseColor: { value: new THREE.Color(member.color) },
                        coreColor: { value: new THREE.Color(member.isCore ? '#ffffff' : '#fff8e6') },
                        time: { value: 0 },
                        glowIntensity: { value: member.isCore ? 0.8 : 0.5 },
                        hoverIntensity: { value: 0.0 },
                        photoTexture: { value: null },
                        hasPhoto: { value: 0 }
                    },
                    vertexShader: `
                        varying vec3 vNormal;
                        varying vec3 vPosition;
                        varying vec2 vUv;
                        
                        void main() {
                            vNormal = normalize(normalMatrix * normal);
                            vPosition = position;
                            vUv = uv;
                            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                        }
                    `,
                    fragmentShader: fragmentShader,
                    transparent: true
                });

                const sphere = new THREE.Mesh(geometry, material);
                group.add(sphere);

                // 星体双层发光环（桌面端）
                if (!isMobile) {
                    const innerRingGeo = new THREE.RingGeometry(
                        sphereRadius * 1.3, 
                        sphereRadius * 1.5, 
                        segmentCount
                    );
                    const innerRingMat = new THREE.MeshBasicMaterial({
                        color: new THREE.Color(member.color),
                        transparent: true,
                        opacity: member.isCore ? 0.3 : 0.2,
                        side: THREE.DoubleSide,
                        blending: THREE.AdditiveBlending
                    });
                    const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
                    innerRing.rotation.x = Math.PI / 2;
                    group.add(innerRing);
                    group.userData.innerRing = innerRing;
                }

                // 位置计算
                if (member.isCore) {
                    group.position.set(0, 0, 0);
                } else {
                    const baseAngleRad = (member.baseAngle + member.offsetAngle) * Math.PI / 180;
                    group.position.set(
                        Math.cos(baseAngleRad) * member.orbitRadius,
                        (Math.random() - 0.5) * (member.level === 1 ? 1.5 : 2),
                        Math.sin(baseAngleRad) * member.orbitRadius
                    );
                }

                // 节点数据存储
                group.userData = {
                    ...member,
                    material,
                    sphere,
                    sphereRadius,
                    originalScale: 1
                };

                scene.add(group);
                galaxyNodes.set(member.id, group);
            });
        }

        // ==================== 亲属连线创建 ====================
        function createRelationLines() {
            const coreNode = galaxyNodes.get('core');
            // 祖辈仅连女儿
            familyData.filter(m => m.level === 1 && m.isMother).forEach(member => {
                const daughterNode = galaxyNodes.get(member.id);
                createLine(coreNode, daughterNode, member.color);
            });
            // 孙辈连父母
            familyData.filter(m => m.level === 2).forEach(member => {
                const childNode = galaxyNodes.get(member.id);
                if (member.motherId) {
                    const motherNode = galaxyNodes.get(member.motherId);
                    if (motherNode) createLine(motherNode, childNode, member.color);
                }
                if (member.fatherId) {
                    const fatherNode = galaxyNodes.get(member.fatherId);
                    if (fatherNode) createLine(fatherNode, childNode, member.color);
                }
            });
        }

        function createLine(startNode, endNode, color) {
            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const lineMat = new THREE.LineBasicMaterial({
                color: new THREE.Color(color),
                transparent: true,
                opacity: 0.35,
                blending: THREE.AdditiveBlending
            });
            const line = new THREE.Line(lineGeo, lineMat);
            line.userData = { startNode, endNode };
            scene.add(line);
            relationLines.push(line);
        }

        // 更新连线位置
        function updateRelationLines() {
            relationLines.forEach(line => {
                const { startNode, endNode } = line.userData;
                const startPos = startNode.position;
                const endPos = endNode.position;
                
                const positions = line.geometry.attributes.position.array;
                positions[0] = startPos.x;
                positions[1] = startPos.y;
                positions[2] = startPos.z;
                positions[3] = endPos.x;
                positions[4] = endPos.y;
                positions[5] = endPos.z;
                line.geometry.attributes.position.needsUpdate = true;
            });
        }

        // ==================== 背景星空 ====================
        function createStarfield() {
            const starGeo = new THREE.BufferGeometry();
            const starPositions = new Float32Array(particleCount * 3);
            const starColors = new Float32Array(particleCount * 3);
            const starSizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                const radius = 150 + Math.random() * 250;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);

                const color = new THREE.Color();
                color.setHSL(0.1 + Math.random() * 0.15, 0.5, 0.7 + Math.random() * 0.3);
                starColors[i * 3] = color.r;
                starColors[i * 3 + 1] = color.g;
                starColors[i * 3 + 2] = color.b;

                starSizes[i] = Math.random() * 2;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

            const starMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    uniform float time;
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float twinkle = sin(time * 1.2 + position.x * 3.0) * 0.5 + 0.5;
                        gl_PointSize = size * (300.0 / -mvPosition.z) * (0.7 + twinkle * 0.5);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
            particleSystems.push({ mesh: stars, material: starMat, type: 'stars' });
        }

        // ==================== 事件监听 ====================
        function initEvents() {
            window.addEventListener('resize', onWindowResize);

            // 鼠标事件（桌面端）
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('click', onClick);

            // 触摸事件（手机端，完美点击）
            renderer.domElement.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
            }, { passive: true });
            renderer.domElement.addEventListener('touchend', (e) => {
                if (!isMoving) {
                    onClick(e);
                }
            }, { passive: true });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            controls.update();
        }

        // 鼠标移动hover检测
        function onMouseMove(e) {
            if (isMobile || isMoving) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
            const intersects = raycaster.intersectObjects(allSpheres);

            if (intersects.length > 0) {
                const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                if (node && node !== hoveredNode) {
                    if (hoveredNode) resetNodeHover(hoveredNode);
                    hoveredNode = node;
                    setNodeHover(node);
                }
                document.body.style.cursor = 'pointer';
            } else {
                if (hoveredNode) {
                    resetNodeHover(hoveredNode);
                    hoveredNode = null;
                }
                document.body.style.cursor = 'default';
            }
            updateHoverLabel(e.clientX, e.clientY);
        }

        // 点击事件（全端通用）
        function onClick(e) {
            if (isMoving) return;
            raycaster.setFromCamera(mouse, camera);
            const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
            const intersects = raycaster.intersectObjects(allSpheres);
            if (intersects.length > 0) {
                const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                if (node) openPhotoModal(node);
            }
        }

        // ==================== 节点hover交互 ====================
        function setNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 1.5 : 1.2;
            data.material.uniforms.hoverIntensity.value = 1.0;
            if (data.innerRing) data.innerRing.material.opacity = data.isCore ? 0.6 : 0.5;
            node.scale.lerp(new THREE.Vector3(1.3, 1.3, 1.3), 0.1);
        }

        function resetNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 0.8 : 0.5;
            data.material.uniforms.hoverIntensity.value = 0.0;
            if (data.innerRing) data.innerRing.material.opacity = data.isCore ? 0.3 : 0.2;
            node.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
        }

        function updateHoverLabel(x, y) {
            const label = document.getElementById('hover-label');
            if (hoveredNode) {
                label.textContent = hoveredNode.userData.name;
                const labelWidth = 100;
                const windowWidth = window.innerWidth;
                const finalX = x + 15 + labelWidth > windowWidth ? x - labelWidth - 15 : x + 15;
                label.style.left = finalX + 'px';
                label.style.top = y - 10 + 'px';
                label.style.background = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.15)`;
                label.style.borderColor = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.3)`;
                label.style.opacity = '1';
            } else {
                label.style.opacity = '0';
            }
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function openPhotoModal(node) {
            const data = node.userData;
            const savedPhoto = localStorage.getItem(`photo_${data.id}`);
            if (!savedPhoto) {
                alert('该成员暂未上传照片，可点击右上角「管理」按钮上传');
                return;
            }
            document.getElementById('modal-photo').src = savedPhoto;
            document.getElementById('modal-name').textContent = data.name;
            document.getElementById('photo-modal').classList.add('open');
        }

        // ==================== UI&上传功能 ====================
        function initUI() {
            // 管理面板开关
            const adminBtn = document.getElementById('admin-btn');
            const adminPanel = document.getElementById('admin-panel');
            const closePanel = document.querySelector('.close-panel');
            
            adminBtn.onclick = () => adminPanel.classList.add('open');
            closePanel.onclick = () => adminPanel.classList.remove('open');

            // 成员下拉框
            const memberSelect = document.getElementById('member-select');
            familyData.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                memberSelect.appendChild(option);
            });

            // 照片上传
            document.getElementById('upload-photo-btn').onclick = uploadPhoto;
            
            // 音乐上传
            document.getElementById('upload-audio-btn').onclick = uploadAudio;

            // 音乐播放控制
            const musicBtn = document.getElementById('music-btn');
            const bgm = document.getElementById('bgm');
            
            // 移动端音频解锁
            document.body.addEventListener('click', () => {
                if (bgm.paused && bgm.src) bgm.load();
            }, { once: true });

            musicBtn.onclick = () => {
                if (!bgm.src || bgm.src === window.location.href) {
                    alert('请先上传背景音乐');
                    return;
                }
                if (bgm.paused) {
                    bgm.play().then(() => {
                        musicBtn.classList.add('playing');
                        musicBtn.textContent = '♫';
                    }).catch(e => {
                        alert('播放失败，请点击页面后重试');
                    });
                } else {
                    bgm.pause();
                    musicBtn.classList.remove('playing');
                    musicBtn.textContent = '♪';
                }
            };

            // 弹窗关闭
            document.querySelector('#photo-modal .close-modal').onclick = () => {
                document.getElementById('photo-modal').classList.remove('open');
            };
            document.getElementById('photo-modal').onclick = (e) => {
                if (e.target === document.getElementById('photo-modal')) {
                    document.getElementById('photo-modal').classList.remove('open');
                }
            };
        }

        function uploadPhoto() {
            const file = document.getElementById('photo-input').files[0];
            const memberId = document.getElementById('member-select').value;
            if (!file || !memberId) {
                alert('请选择成员和照片');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('照片不能超过5MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem(`photo_${memberId}`, dataUrl);
                updateNodePhotoTexture(memberId, dataUrl);
                alert('上传成功！点击星球即可查看');
                document.getElementById('photo-input').value = '';
            };
            reader.readAsDataURL(file);
        }

        function updateNodePhotoTexture(memberId, photoUrl) {
            const node = galaxyNodes.get(memberId);
            if (!node) return;
            
            textureLoader.load(
                photoUrl,
                (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    node.userData.material.uniforms.photoTexture.value = texture;
                    node.userData.material.uniforms.hasPhoto.value = 1;
                    node.userData.material.needsUpdate = true;
                },
                undefined,
                (err) => console.error('纹理加载失败', err)
            );
        }

        function uploadAudio() {
            const file = document.getElementById('audio-input').files[0];
            const bgm = document.getElementById('bgm');
            if (!file) {
                alert('请选择音频文件');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('音频不能超过10MB');
                return;
            }

            const reader = new FileReader();
            reader.onloadstart = () => {
                document.getElementById('upload-audio-btn').textContent = '上传中...';
                document.getElementById('upload-audio-btn').disabled = true;
            };
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem('bgm_audio', dataUrl);
                bgm.src = dataUrl;
                bgm.load();
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('上传成功！点击左上角按钮播放');
                document.getElementById('audio-input').value = '';
            };
            reader.onerror = () => {
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('读取失败，请重试');
            };
            reader.readAsDataURL(file);
        }

        function loadSavedData() {
            const savedAudio = localStorage.getItem('bgm_audio');
            if (savedAudio) {
                document.getElementById('bgm').src = savedAudio;
            }
            familyData.forEach(member => {
                const savedPhoto = localStorage.getItem(`photo_${member.id}`);
                if (savedPhoto) {
                    updateNodePhotoTexture(member.id, savedPhoto);
                }
            });
        }

        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;

            // 更新控制器（必须每帧调用，丝滑阻尼）
            controls.update();

            // 更新轨道环动态效果
            orbitRings.forEach(ring => {
                if (ring.material.uniforms.time) {
                    ring.material.uniforms.time.value = time;
                }
            });

            // 更新轨道流动光点
            orbitParticles.forEach(orbit => {
                const positions = orbit.mesh.geometry.attributes.position.array;
                for (let i = 0; i < positions.length / 3; i++) {
                    const x = positions[i * 3];
                    const z = positions[i * 3 + 2];
                    let angle = Math.atan2(z, x);
                    angle += orbit.speeds[i];
                    positions[i * 3] = Math.cos(angle) * orbit.radius;
                    positions[i * 3 + 2] = Math.sin(angle) * orbit.radius;
                }
                orbit.mesh.geometry.attributes.position.needsUpdate = true;
            });

            // 更新星体自转&材质时间
            galaxyNodes.forEach(node => {
                const data = node.userData;
                node.rotation.y += data.isCore ? 0.001 : 0.002;
                if (!isMobile) data.material.uniforms.time.value = time;
            });

            // 更新连线
            updateRelationLines();

            // 更新星空粒子
            particleSystems.forEach(sys => {
                if (sys.material.uniforms && sys.material.uniforms.time) {
                    sys.material.uniforms.time.value = time;
                }
            });

            // 渲染
            renderer.render(scene, camera);
        }

        // 页面加载启动
        window.onload = init;
    </script>
</body>
</html>
