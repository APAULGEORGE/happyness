<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开心聚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* UI 样式 */
        #header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        #header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #d4af37, #f5e6c8, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #hover-label {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            font-size: 18px;
            font-weight: 400;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        #mobile-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            display: none;
        }
        @media (hover: none) {
            #mobile-hint { display: block; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
        /* 管理面板样式 */
        #admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        #admin-btn:hover { background: rgba(255,255,255,0.2); }
        #admin-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 103;
            padding: 20px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255,255,255,0.1);
        }
        #admin-panel.open { right: 0; }
        #admin-panel h2 {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .upload-section { margin-bottom: 20px; }
        .upload-section label {
            display: block;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .upload-section select,
        .upload-section input[type="file"] {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .upload-btn {
            width: 100%;
            background: linear-gradient(90deg, #d4af37, #b8941f);
            border: none;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-btn:hover { transform: scale(1.02); }
        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
        }
        .close-panel:hover { opacity: 1; }
        /* 音乐控制 */
        #music-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        #music-btn:hover { background: rgba(255,255,255,0.2); }
        #music-btn.playing { background: rgba(212, 175, 55, 0.3); border-color: #d4af37; }
        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        /* 进度指示器 */
        #progress-indicator {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .progress-dot.active {
            background: #d4af37;
            transform: scale(1.5);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        /* 照片预览弹窗 */
        #photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #photo-modal.open { display: flex; }
        #photo-modal img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.5);
        }
        #photo-modal .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: none;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        #photo-modal .close-modal:hover { opacity: 1; }
        #photo-modal .modal-name {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
        }
        /* 错误提示 */
        #error-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 300;
            text-align: center;
            display: none;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="header"><h1>开心聚</h1></div>
    <div id="hover-label"></div>
    <div id="scroll-hint">滚动探索</div>
    <div id="mobile-hint">单指旋转 · 双指平移/缩放 · 点击查看</div>
    
    <button id="music-btn">♪</button>
    <button id="admin-btn">管理</button>
    
    <!-- 管理面板 -->
    <div id="admin-panel">
        <button class="close-panel">&times;</button>
        <h2>家族管理</h2>
        <div class="upload-section">
            <label>上传成员照片</label>
            <select id="member-select"></select>
            <input type="file" id="photo-input" accept="image/jpeg,image/png,image/jpg">
            <button class="upload-btn" id="upload-photo-btn">上传照片</button>
        </div>
        <div class="upload-section">
            <label>上传背景音乐</label>
            <input type="file" id="audio-input" accept="audio/mp3,audio/wav,audio/m4a,audio/mpeg">
            <button class="upload-btn" id="upload-audio-btn">上传音乐</button>
            <p style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px;">支持mp3/wav/m4a格式，大小不超过10MB</p>
        </div>
    </div>
    
    <!-- 进度指示器 -->
    <div id="progress-indicator"></div>
    
    <!-- 加载页 -->
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">加载家族星系中...</div>
    </div>
    <!-- 错误提示 -->
    <div id="error-tip">
        <h2>加载失败</h2>
        <p id="error-text">请检查浏览器是否支持WebGL，或更换Chrome/Edge浏览器重试</p>
    </div>
    <!-- 照片预览弹窗 -->
    <div id="photo-modal">
        <button class="close-modal">&times;</button>
        <img id="modal-photo" src="" alt="成员照片">
        <div class="modal-name" id="modal-name"></div>
    </div>
    
    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto">
    <!-- 稳定CDN资源 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script>
        // 全局错误捕获
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('loading-text').textContent = '加载出错';
            document.getElementById('error-tip').style.display = 'block';
            document.getElementById('error-text').textContent = `错误：${message}`;
            console.error('页面错误：', message, error);
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        }
        // ==================== 【4个家庭专属配置，同家庭统一配色】====================
        // 家庭配色：每个家庭一个专属主色，同家庭所有成员统一色系
        const familyConfig = {
            1: { name: '田延芝家庭', color: '#d4af37', baseAngle: 0 },    // 暖金色
            2: { name: '田延英家庭', color: '#e27d48', baseAngle: 90 },   // 暖橘色
            3: { name: '田延兰家庭', color: '#48a79c', baseAngle: 180 },  // 青绿色
            4: { name: '田玉莲家庭', color: '#8d5fc9', baseAngle: 270 }   // 紫金色
        };
        // ==================== 完整家族成员数据（严格按家庭分组）====================
        // level 0：祖辈（中心，最大）
        // level 1：二代（女儿/女婿，中等大小，第二圈）
        // level 2：三代（孙辈，最小，第三圈，父母正后方）
        const familyData = [
            // 核心祖辈
            { 
                id: 'core', 
                name: '张明菊', 
                level: 0, 
                color: '#f8e0a0', 
                isCore: true,
                familyId: 0,
                orbitRadius: 0,
                baseAngle: 0
            },
            // ========== 家庭1：大女儿 田延芝 家 ==========
            { 
                id: 'tianyanzhi', 
                name: '田延芝', 
                level: 1, 
                color: familyConfig[1].color, 
                parentId: 'core',
                isMother: true,
                familyId: 1,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -5 // 夫妻相邻，左偏移5度
            },
            { 
                id: 'tanxiaowei', 
                name: '谭小伟', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null, // 无父亲信息则不连
                familyId: 1,
                orbitRadius: 20, // 缩小轨道
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -3
            },
            { 
                id: 'tanxiaoping', 
                name: '谭晓萍', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 20, // 缩小轨道
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: 3
            },
            // ========== 家庭2：二女儿 田延英 家 ==========
            { 
                id: 'tianyanying', 
                name: '田延英', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: 'core',
                isMother: true,
                familyId: 2,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanyuangui', 
                name: '谭元贵', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: null, // 女婿不连祖辈
                isFather: true,
                familyId: 2,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 5 // 夫妻相邻，右偏移5度
            },
            { 
                id: 'tanjunna', 
                name: '谭畯娜', 
                level: 2, 
                color: familyConfig[2].color, 
                motherId: 'tianyanying',
                fatherId: 'tanyuangui',
                familyId: 2,
                orbitRadius: 20, // 缩小轨道
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 0
            },
            // ========== 家庭3：三女儿 田延兰 家 ==========
            { 
                id: 'tianyanlan', 
                name: '田延兰', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: 'core',
                isMother: true,
                familyId: 3,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'chenhongshun', 
                name: '陈洪顺', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: null,
                isFather: true,
                familyId: 3,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'chensiyu', 
                name: '陈思昱', 
                level: 2, 
                color: familyConfig[3].color, 
                motherId: 'tianyanlan',
                fatherId: 'chenhongshun',
                familyId: 3,
                orbitRadius: 20, // 缩小轨道
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 0
            },
            // ========== 家庭4：四女儿 田玉莲 家 ==========
            { 
                id: 'tianyulian', 
                name: '田玉莲', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: 'core',
                isMother: true,
                familyId: 4,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanshuai', 
                name: '谭帅', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: null,
                isFather: true,
                familyId: 4,
                orbitRadius: 12, // 缩小轨道
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanxinmiao', 
                name: '谭鑫淼', 
                level: 2, 
                color: familyConfig[4].color, 
                motherId: 'tianyulian',
                fatherId: 'tanshuai',
                familyId: 4,
                orbitRadius: 20, // 缩小轨道
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 0
            },
        ];
        // 相机关键帧（适配缩小后的轨道）
        const cameraKeyframes = [
            { position: [0, 0, 40], lookAt: [0, 0, 0], name: '全景' },
            { position: [0, 0, 28], lookAt: [0, 0, 0], name: '核心祖辈' },
            { position: [15, 8, 20], lookAt: [0, 0, 0], name: '二代家庭' },
            { position: [25, 12, 15], lookAt: [12, 0, 0], name: '三代孙辈' },
        ];
        // ==================== 全局变量 ====================
        let scene, camera, renderer, composer;
        let galaxyRoot; // 星系根节点，用于整体旋转
        let galaxyNodes = new Map();
        let relationLines = [];
        let orbitRings = [];
        let particleSystems = [];
        let hoveredNode = null;
        let focusedNode = null;
        let progress = 0;
        let targetProgress = 0;
        let isMobile = 'ontouchstart' in window;
        let isDragging = false;
        let isRightDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraOffset = { x: 0, y: 0, z: 0 };
        let touchStartDistance = 0;
        let isPostProcessingAvailable = true;
        let textureLoader = new THREE.TextureLoader();
        // ==================== 初始化 ====================
        function init() {
            try {
                scene = new THREE.Scene();
                // 移除雾效
                // scene.fog = new THREE.FogExp2(0x000000, 0.015);
                
                // 创建星系根节点
                galaxyRoot = new THREE.Group();
                scene.add(galaxyRoot);
                
                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
                camera.position.set(...cameraKeyframes[0].position);
                renderer = new THREE.WebGLRenderer({ 
                    antialias: true, 
                    alpha: true,
                    failIfMajorPerformanceCaveat: false,
                    powerPreference: "high-performance"
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.3;
                document.getElementById('canvas-container').appendChild(renderer.domElement);
                // 后处理（高级柔和辉光）
                try {
                    initPostProcessing();
                } catch (e) {
                    console.warn('后处理特效加载失败，已降级渲染', e);
                    isPostProcessingAvailable = false;
                }
                // 星系创建
                createOrbitRings();
                createGalaxyHierarchy();
                createRelationLines();
                createParticleSystems();
                createMilkyWay();
                // 事件&UI初始化
                initEvents();
                initUI();
                loadSavedData();
                initProgressIndicator();
                // 隐藏加载页
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 800);
                animate();
            } catch (initError) {
                console.error('初始化失败', initError);
                window.onerror('初始化3D场景失败', '', 0, 0, initError);
            }
        }
        // ==================== 后处理 ====================
        function initPostProcessing() {
            composer = new THREE.EffectComposer(renderer);
            const renderPass = new THREE.RenderPass(scene, camera);
            composer.addPass(renderPass);
            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                2.2, 0.2, 0.8
            );
            bloomPass.threshold = 0.05;
            bloomPass.strength = 1.6;
            bloomPass.radius = 0.8;
            composer.addPass(bloomPass);
        }
        // ==================== 星系轨道环 ====================
        function createOrbitRings() {
            // 二代轨道环，适配缩小后的轨道
            const level1RingGeo = new THREE.RingGeometry(11.5, 12.5, 128);
            const level1RingMat = new THREE.MeshBasicMaterial({
                color: 0xd4af37,
                transparent: true,
                opacity: 0.12,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const level1Ring = new THREE.Mesh(level1RingGeo, level1RingMat);
            level1Ring.rotation.x = Math.PI / 2;
            galaxyRoot.add(level1Ring);
            orbitRings.push(level1Ring);
            // 三代轨道环，适配缩小后的轨道
            const level2RingGeo = new THREE.RingGeometry(19.5, 20.5, 128);
            const level2RingMat = new THREE.MeshBasicMaterial({
                color: 0xf0d78c,
                transparent: true,
                opacity: 0.08,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const level2Ring = new THREE.Mesh(level2RingGeo, level2RingMat);
            level2Ring.rotation.x = Math.PI / 2;
            galaxyRoot.add(level2Ring);
            orbitRings.push(level2Ring);
        }
        // ==================== 层级化星系创建（家庭分组不分散）====================
        function createGalaxyHierarchy() {
            // 按层级顺序创建：核心→二代→三代
            const maxLevel = Math.max(...familyData.map(m => m.level));
            for (let level = 0; level <= maxLevel; level++) {
                const levelMembers = familyData.filter(m => m.level === level);
                levelMembers.forEach(member => {
                    createGalaxyNode(member);
                });
            }
        }
        // ==================== 高级质感星体创建（严格按辈分区分大小）====================
        function createGalaxyNode(member) {
            const group = new THREE.Group();
            
            // 【严格按辈分区分球体大小】同辈分完全统一
            let sphereRadius;
            switch(member.level) {
                case 0: sphereRadius = 1.8; break; // 祖辈最大
                case 1: sphereRadius = 1.1; break; // 二代统一大小
                case 2: sphereRadius = 0.8; break; // 三代统一大小
                default: sphereRadius = 0.8;
            }
            const geometry = new THREE.SphereGeometry(sphereRadius, 128, 128);
            // 高级星体Shader材质
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    baseColor: { value: new THREE.Color(member.color) },
                    coreColor: { value: new THREE.Color(member.isCore ? '#ffffff' : '#fff8e6') },
                    time: { value: 0 },
                    glowIntensity: { value: member.isCore ? 1.0 : 0.6 },
                    hoverIntensity: { value: 0.0 },
                    photoTexture: { value: null },
                    hasPhoto: { value: 0 } // 默认不显示照片
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying vec2 vUv;
                    varying float vFresnel;
                    
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        vUv = uv;
                        vFresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 baseColor;
                    uniform vec3 coreColor;
                    uniform float time;
                    uniform float glowIntensity;
                    uniform float hoverIntensity;
                    uniform sampler2D photoTexture;
                    uniform float hasPhoto;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying vec2 vUv;
                    varying float vFresnel;
                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }
                    void main() {
                        float distFromCenter = length(vPosition);
                        float coreGradient = 1.0 - smoothstep(0.0, 1.0, distFromCenter);
                        vec3 base = mix(baseColor, coreColor, coreGradient * 0.8);
                        // 动态大气纹理
                        vec2 noiseUv = vUv * 3.0 + vec2(time * 0.1, time * 0.05);
                        float surfaceNoise = noise(noiseUv) * 0.15;
                        base += surfaceNoise * baseColor;
                        // 照片贴图融合（已禁用，不显示在星球上）
                        // if (hasPhoto > 0.5) {
                        //     vec4 photoColor = texture2D(photoTexture, vUv);
                        //     base = mix(base, photoColor.rgb, 0.85);
                        // }
                        // 双层菲涅尔辉光
                        float innerFresnel = pow(vFresnel, 1.2);
                        float outerFresnel = pow(vFresnel, 0.6);
                        vec3 fresnelGlow = innerFresnel * coreColor * (1.0 + hoverIntensity * 2.0);
                        vec3 outerGlow = outerFresnel * baseColor * (glowIntensity + hoverIntensity);
                        
                        vec3 finalColor = base + fresnelGlow + outerGlow;
                        float alpha = 1.0 + outerFresnel * 0.5;
                        gl_FragColor = vec4(finalColor, alpha);
                    }
                `,
                transparent: true,
                side: THREE.FrontSide
            });
            const sphere = new THREE.Mesh(geometry, material);
            group.add(sphere);
            // 双层发光环
            const innerRingGeo = new THREE.RingGeometry(
                sphereRadius * 1.3, 
                sphereRadius * 1.5, 
                128
            );
            const innerRingMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(member.color),
                transparent: true,
                opacity: member.isCore ? 0.35 : 0.25,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
            innerRing.rotation.x = Math.PI / 2;
            group.add(innerRing);
            const outerRingGeo = new THREE.RingGeometry(
                sphereRadius * 1.8, 
                sphereRadius * 2.2, 
                128
            );
            const outerRingMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(member.color),
                transparent: true,
                opacity: member.isCore ? 0.15 : 0.1,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
            outerRing.rotation.x = Math.PI / 2;
            group.add(outerRing);
            // 粒子光晕
            const haloCount = member.isCore ? 200 : member.level === 1 ? 120 : 80;
            const haloGeo = new THREE.BufferGeometry();
            const haloPositions = new Float32Array(haloCount * 3);
            const haloSizes = new Float32Array(haloCount);
            for (let i = 0; i < haloCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = sphereRadius * 2.2 + Math.random() * 1.2;
                haloPositions[i * 3] = Math.cos(angle) * radius;
                haloPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.6;
                haloPositions[i * 3 + 2] = Math.sin(angle) * radius;
                haloSizes[i] = 0.04 + Math.random() * 0.06;
            }
            haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPositions, 3));
            haloGeo.setAttribute('size', new THREE.BufferAttribute(haloSizes, 1));
            const haloMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 }, color: { value: new THREE.Color(member.color) } },
                vertexShader: `
                    attribute float size;
                    uniform float time;
                    varying float vAlpha;
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float twinkle = sin(time * 2.0 + position.x * 10.0) * 0.5 + 0.5;
                        gl_PointSize = size * (300.0 / -mvPosition.z) * twinkle;
                        vAlpha = 0.4 + twinkle * 0.6;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `
                ,
                fragmentShader: `
                    uniform vec3 color;
                    varying float vAlpha;
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        gl_FragColor = vec4(color, alpha * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const halo = new THREE.Points(haloGeo, haloMat);
            group.add(halo);
            // 【家庭分组布局】同家庭同角度，孙辈在父母正后方
            if (member.isCore) {
                group.position.set(0, 0, 0);
            } else {
                // 角度计算：家庭基准角度 + 偏移角度，转弧度
                const baseAngleRad = (member.baseAngle + member.offsetAngle) * Math.PI / 180;
                group.position.set(
                    Math.cos(baseAngleRad) * member.orbitRadius,
                    (Math.random() - 0.5) * (member.level === 1 ? 1.5 : 2), // 轻微高低错落
                    Math.sin(baseAngleRad) * member.orbitRadius
                );
            }
            // 节点数据存储
            group.userData = {
                ...member,
                material,
                sphere,
                innerRing,
                outerRing,
                halo,
                haloMat,
                sphereRadius,
                originalScale: 1,
                // 统一公转速度，所有家庭同速，永不相撞
                orbitSpeed: member.familyId === 0 ? 0 : 0.05,
                selfRotateSpeed: member.isCore ? 0.002 : member.level === 1 ? 0.004 : member.level === 2 ? 0.006 : 0.005
            };
            galaxyRoot.add(group);
            galaxyNodes.set(member.id, group);
        }
        // ==================== 【精准连线规则】====================
        function createRelationLines() {
            // 1. 祖辈 → 仅和4个女儿连线（不和女婿连线）
            const coreNode = galaxyNodes.get('core');
            familyData.filter(m => m.level === 1 && m.isMother).forEach(member => {
                const daughterNode = galaxyNodes.get(member.id);
                createLine(coreNode, daughterNode, member.color);
            });
            // 2. 孙辈 → 和自己的母亲、父亲都连线
            familyData.filter(m => m.level === 2).forEach(member => {
                const childNode = galaxyNodes.get(member.id);
                // 连母亲
                if (member.motherId) {
                    const motherNode = galaxyNodes.get(member.motherId);
                    if (motherNode) createLine(motherNode, childNode, member.color);
                }
                // 连父亲
                if (member.fatherId) {
                    const fatherNode = galaxyNodes.get(member.fatherId);
                    if (fatherNode) createLine(fatherNode, childNode, member.color);
                }
            });
        }
        // 创建单条连线
        function createLine(startNode, endNode, color) {
            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const lineMat = new THREE.LineBasicMaterial({
                color: new THREE.Color(color),
                transparent: true,
                opacity: 0.35,
                blending: THREE.AdditiveBlending
            });
            const line = new THREE.Line(lineGeo, lineMat);
            line.userData = { startNode, endNode };
            galaxyRoot.add(line);
            relationLines.push(line);
        }
        // 更新连线位置（随公转动画实时更新）
        function updateRelationLines() {
            relationLines.forEach(line => {
                const { startNode, endNode } = line.userData;
                const startPos = startNode.position;
                const endPos = endNode.position;
                
                const positions = line.geometry.attributes.position.array;
                positions[0] = startPos.x;
                positions[1] = startPos.y;
                positions[2] = startPos.z;
                positions[3] = endPos.x;
                positions[4] = endPos.y;
                positions[5] = endPos.z;
                line.geometry.attributes.position.needsUpdate = true;
            });
        }
        // ==================== 背景粒子&银河 ====================
        function createParticleSystems() {
            // 背景星空
            const starGeo = new THREE.BufferGeometry();
            const starCount = 4000;
            const starPositions = new Float32Array(starCount * 3);
            const starColors = new Float32Array(starCount * 3);
            const starSizes = new Float32Array(starCount);
            for (let i = 0; i < starCount; i++) {
                const radius = 150 + Math.random() * 250;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);
                const color = new THREE.Color();
                color.setHSL(0.1 + Math.random() * 0.15, 0.5, 0.7 + Math.random() * 0.3);
                starColors[i * 3] = color.r;
                starColors[i * 3 + 1] = color.g;
                starColors[i * 3 + 2] = color.b;
                starSizes[i] = Math.random() * 3;
            }
            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
            const starMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    uniform float time;
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float twinkle = sin(time * 1.2 + position.x * 3.0) * 0.5 + 0.5;
                        gl_PointSize = size * (300.0 / -mvPosition.z) * (0.7 + twinkle * 0.5);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
            particleSystems.push({ mesh: stars, material: starMat, type: 'stars' });
            // 背景涡旋粒子
            const vortexGeo = new THREE.BufferGeometry();
            const vortexCount = 1000;
            const vortexPositions = new Float32Array(vortexCount * 3);
            const vortexColors = new Float32Array(vortexCount * 3);
            for (let i = 0; i < vortexCount; i++) {
                const t = i / vortexCount;
                const angle = t * Math.PI * 12;
                const radius = t * 40;
                vortexPositions[i * 3] = Math.cos(angle) * radius;
                vortexPositions[i * 3 + 1] = (t - 0.5) * 20;
                vortexPositions[i * 3 + 2] = Math.sin(angle) * radius;
                const color = new THREE.Color();
                color.setHSL(0.1, 0.6, 0.5 + t * 0.3);
                vortexColors[i * 3] = color.r;
                vortexColors[i * 3 + 1] = color.g;
                vortexColors[i * 3 + 2] = color.b;
            }
            vortexGeo.setAttribute('position', new THREE.BufferAttribute(vortexPositions, 3));
            vortexGeo.setAttribute('color', new THREE.BufferAttribute(vortexColors, 3));
            const vortexMat = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            const vortex = new THREE.Points(vortexGeo, vortexMat);
            scene.add(vortex);
            particleSystems.push({ mesh: vortex, type: 'vortex' });
        }
        function createMilkyWay() {
            const geo = new THREE.PlaneGeometry(600, 600, 256, 256);
            const mat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vUv = uv;
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    
                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }
                    
                    void main() {
                        vec2 center = vUv - 0.5;
                        float dist = length(center);
                        float ring = smoothstep(0.7, 0.0, dist) * smoothstep(0.1, 0.3, dist);
                        
                        float n = noise(vUv * 6.0 + time * 0.003);
                        vec3 color = vec3(0.9, 0.8, 0.5) * ring * (0.3 + n * 0.7);
                        float alpha = ring * 0.2;
                        
                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const milkyWay = new THREE.Mesh(geo, mat);
            milkyWay.rotation.x = Math.PI / 3;
            scene.add(milkyWay);
            particleSystems.push({ mesh: milkyWay, material: mat, type: 'milkyway' });
        }
        // ==================== 事件监听 ====================
        function initEvents() {
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('mousemove', onMouseMove);
            renderer.domElement.addEventListener('mousedown', onMouseDown);
            renderer.domElement.addEventListener('mouseup', onMouseUp);
            renderer.domElement.addEventListener('wheel', onWheel, { passive: false });
            renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
            if (isMobile) {
                renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
                renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
                renderer.domElement.addEventListener('touchend', onTouchEnd);
            }
            document.querySelector('#photo-modal .close-modal').onclick = () => {
                document.getElementById('photo-modal').classList.remove('open');
            };
            document.getElementById('photo-modal').onclick = (e) => {
                if (e.target === document.getElementById('photo-modal')) {
                    document.getElementById('photo-modal').classList.remove('open');
                }
            };
        }
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (isPostProcessingAvailable && composer) {
                composer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        // 通用射线检测函数
        function updateHover(clientX, clientY) {
            const mouse = new THREE.Vector2(
                (clientX / window.innerWidth) * 2 - 1,
                -(clientY / window.innerHeight) * 2 + 1
            );
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(mouse, camera);
            const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
            const intersects = raycaster.intersectObjects(allSpheres);
            if (intersects.length > 0) {
                const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                if (node && node !== hoveredNode) {
                    if (hoveredNode) resetNodeHover(hoveredNode);
                    hoveredNode = node;
                    setNodeHover(node);
                }
                document.body.style.cursor = 'pointer';
            } else {
                if (hoveredNode) {
                    resetNodeHover(hoveredNode);
                    hoveredNode = null;
                }
                document.body.style.cursor = 'grab';
            }
        }
        
        function onMouseMove(e) {
            if (isDragging) {
                // 左键拖动：旋转整个星系
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                galaxyRoot.rotation.y += deltaX * 0.01;
                galaxyRoot.rotation.x += deltaY * 0.01;
            } else if (isRightDragging) {
                // 右键拖动：平移相机
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                cameraOffset.x += deltaX * 0.05;
                cameraOffset.y -= deltaY * 0.05;
            } else {
                // 更新hover状态
                updateHover(e.clientX, e.clientY);
            }
            updateHoverLabel(e.clientX, e.clientY);
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        function onMouseDown(e) {
            if (e.button === 0) isDragging = true;
            if (e.button === 2) isRightDragging = true;
            document.body.style.cursor = e.button === 0 ? 'grab' : 'move';
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        function onMouseUp(e) {
            if (e.button === 0) {
                isDragging = false;
                // 点击检测
                const deltaMove = Math.hypot(e.clientX - previousMousePosition.x, e.clientY - previousMousePosition.y);
                if (deltaMove < 15 && hoveredNode) {
                    focusedNode = focusedNode === hoveredNode ? null : hoveredNode;
                    openPhotoModal(hoveredNode);
                }
            }
            if (e.button === 2) isRightDragging = false;
            document.body.style.cursor = hoveredNode ? 'pointer' : 'grab';
        }
        function onWheel(e) {
            e.preventDefault();
            targetProgress += e.deltaY * 0.001;
            targetProgress = Math.max(0, Math.min(targetProgress, cameraKeyframes.length - 1));
            // 同时也支持滚轮直接缩放相机
            cameraOffset.z += e.deltaY * 0.05;
        }
        
        // 触摸事件
        let touchStartX = 0, touchStartY = 0;
        function onTouchStart(e) {
            e.preventDefault();
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                isDragging = true;
            } else if (e.touches.length === 2) {
                touchStartDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
            previousMousePosition = { x: e.touches[0]?.clientX || 0, y: e.touches[0]?.clientY || 0 };
        }
        function onTouchMove(e) {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                // 单指滑动：旋转整个星系
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;
                galaxyRoot.rotation.y += deltaX * 0.01;
                galaxyRoot.rotation.x += deltaY * 0.01;
                // 更新hover状态
                updateHover(e.touches[0].clientX, e.touches[0].clientY);
            } else if (e.touches.length === 2) {
                // 双指操作
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                // 双指滑动：平移相机
                const deltaX = e.touches[0].clientX - previousMousePosition.x;
                const deltaY = e.touches[0].clientY - previousMousePosition.y;
                cameraOffset.x += deltaX * 0.05;
                cameraOffset.y -= deltaY * 0.05;
                // 双指捏合：缩放相机
                const delta = currentDistance - touchStartDistance;
                cameraOffset.z -= delta * 0.05;
                touchStartDistance = currentDistance;
            }
            updateHoverLabel(e.touches[0].clientX, e.touches[0].clientY);
            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        function onTouchEnd(e) {
            isDragging = false;
            const touchEndX = e.changedTouches[0]?.clientX;
            const touchEndY = e.changedTouches[0]?.clientY;
            const deltaMove = Math.hypot(touchEndX - touchStartX, touchEndY - touchStartY);
            
            // 点击检测，修复移动端点击
            if (deltaMove < 15 && hoveredNode) {
                focusedNode = focusedNode === hoveredNode ? null : hoveredNode;
                openPhotoModal(hoveredNode);
            }
        }
        // ==================== 节点hover交互 ====================
        function setNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 1.8 : 1.4;
            data.material.uniforms.hoverIntensity.value = 1.0;
            data.innerRing.material.opacity = data.isCore ? 0.6 : 0.5;
            data.outerRing.material.opacity = data.isCore ? 0.3 : 0.25;
            node.scale.lerp(new THREE.Vector3(1.4, 1.4, 1.4), 0.1);
        }
        function resetNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 1.0 : 0.6;
            data.material.uniforms.hoverIntensity.value = 0.0;
            data.innerRing.material.opacity = data.isCore ? 0.35 : 0.25;
            data.outerRing.material.opacity = data.isCore ? 0.15 : 0.1;
            node.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
        }
        function updateHoverLabel(x, y) {
            const label = document.getElementById('hover-label');
            if (hoveredNode) {
                label.textContent = hoveredNode.userData.name;
                label.style.left = x + 15 + 'px';
                label.style.top = y - 10 + 'px';
                label.style.background = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.15)`;
                label.style.borderColor = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.3)`;
                label.style.opacity = '1';
            } else {
                label.style.opacity = '0';
            }
        }
        // 十六进制转RGB
        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }
        function openPhotoModal(node) {
            const data = node.userData;
            const savedPhoto = localStorage.getItem(`photo_${data.id}`);
            if (!savedPhoto) {
                alert('该成员暂未上传照片，可点击右上角「管理」按钮上传');
                return;
            }
            document.getElementById('modal-photo').src = savedPhoto;
            document.getElementById('modal-name').textContent = data.name;
            document.getElementById('photo-modal').classList.add('open');
        }
        // ==================== UI&上传功能 ====================
        function initUI() {
            // 管理面板开关
            const adminBtn = document.getElementById('admin-btn');
            const adminPanel = document.getElementById('admin-panel');
            const closePanel = document.querySelector('.close-panel');
            
            adminBtn.onclick = () => adminPanel.classList.add('open');
            closePanel.onclick = () => adminPanel.classList.remove('open');
            // 成员下拉框
            const memberSelect = document.getElementById('member-select');
            familyData.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                memberSelect.appendChild(option);
            });
            // 照片上传
            document.getElementById('upload-photo-btn').onclick = uploadPhoto;
            
            // 音乐上传
            document.getElementById('upload-audio-btn').onclick = uploadAudio;
            // 音乐播放控制
            const musicBtn = document.getElementById('music-btn');
            const bgm = document.getElementById('bgm');
            
            bgm.onloadeddata = () => console.log('音频加载完成');
            bgm.onerror = (e) => {
                console.error('音频加载失败', e);
                alert('音频文件加载失败，请检查文件格式后重新上传');
            };
            musicBtn.onclick = () => {
                if (!bgm.src || bgm.src === window.location.href) {
                    alert('请先上传背景音乐');
                    return;
                }
                bgm.play().then(() => {
                    musicBtn.classList.add('playing');
                    musicBtn.textContent = '♫';
                }).catch(e => {
                    console.warn('音频播放失败', e);
                    alert('播放失败，请点击页面任意位置后重试，或检查浏览器音频权限');
                });
                bgm.onpause = () => {
                    musicBtn.classList.remove('playing');
                    musicBtn.textContent = '♪';
                };
            };
        }
        // 照片上传功能
        function uploadPhoto() {
            const file = document.getElementById('photo-input').files[0];
            const memberId = document.getElementById('member-select').value;
            if (!file || !memberId) {
                alert('请先选择成员和照片文件');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('照片大小不能超过5MB');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem(`photo_${memberId}`, dataUrl);
                // 不再更新星球的纹理，只保存照片用于弹窗
                // updateNodePhotoTexture(memberId, dataUrl);
                alert('照片上传成功！点击星球即可查看');
                document.getElementById('photo-input').value = '';
            };
            reader.onerror = () => alert('照片读取失败，请重试');
            reader.readAsDataURL(file);
        }
        // 更新星球照片贴图（已禁用，不再贴到星球上）
        function updateNodePhotoTexture(memberId, photoUrl) {
            // 已禁用，保留函数以防后续需要
        }
        // 音频上传功能
        function uploadAudio() {
            const file = document.getElementById('audio-input').files[0];
            const bgm = document.getElementById('bgm');
            if (!file) {
                alert('请先选择音频文件');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('音频大小不能超过10MB，建议压缩后上传');
                return;
            }
            const reader = new FileReader();
            reader.onloadstart = () => {
                document.getElementById('upload-audio-btn').textContent = '上传中...';
                document.getElementById('upload-audio-btn').disabled = true;
            };
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem('bgm_audio', dataUrl);
                bgm.src = dataUrl;
                bgm.load();
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('音乐上传成功！点击左上角♪按钮即可播放');
                document.getElementById('audio-input').value = '';
            };
            reader.onerror = () => {
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('音频读取失败，请检查文件格式后重试');
            };
            reader.readAsDataURL(file);
        }
        // 加载已保存的照片和音乐
        function loadSavedData() {
            const savedAudio = localStorage.getItem('bgm_audio');
            if (savedAudio) {
                document.getElementById('bgm').src = savedAudio;
            }
            // 不再加载照片到星球上，只保留本地存储用于弹窗
            // familyData.forEach(member => {
            //     const savedPhoto = localStorage.getItem(`photo_${member.id}`);
            //     if (savedPhoto) {
            //         updateNodePhotoTexture(member.id, savedPhoto);
            //     }
            // });
        }
        // ==================== 进度指示器 ====================
        function initProgressIndicator() {
            const container = document.getElementById('progress-indicator');
            cameraKeyframes.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
                dot.title = cameraKeyframes[i].name;
                dot.onclick = () => { targetProgress = i; };
                container.appendChild(dot);
            });
        }
        function updateProgressIndicator() {
            const dots = document.querySelectorAll('.progress-dot');
            const activeIndex = Math.round(progress);
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === activeIndex);
            });
        }
        // ==================== 动画循环 ====================
        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            // 平滑进度
            progress += (targetProgress - progress) * 0.05;
            // 更新相机
            updateCamera(time);
            // 更新星体动画
            updateGalaxyNodes(time);
            // 更新亲属连线
            updateRelationLines();
            // 更新粒子动画
            updateParticleSystems(time);
            // 更新进度指示器
            updateProgressIndicator();
            // 渲染
            if (isPostProcessingAvailable && composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }
        function updateCamera(time) {
            const keyIndex = Math.floor(progress);
            const nextIndex = Math.min(keyIndex + 1, cameraKeyframes.length - 1);
            const t = progress - keyIndex;
            const easeT = easeInOutQuart(t);
            const startKey = cameraKeyframes[keyIndex];
            const endKey = cameraKeyframes[nextIndex];
            let targetPos = new THREE.Vector3(
                lerp(startKey.position[0], endKey.position[0], easeT),
                lerp(startKey.position[1], endKey.position[1], easeT),
                lerp(startKey.position[2], endKey.position[2], easeT)
            );
            let targetLookAt = new THREE.Vector3(
                lerp(startKey.lookAt[0], endKey.lookAt[0], easeT),
                lerp(startKey.lookAt[1], endKey.lookAt[1], easeT),
                lerp(startKey.lookAt[2], endKey.lookAt[2], easeT)
            );
            if (focusedNode) {
                const focusPos = focusedNode.position;
                const worldPos = new THREE.Vector3();
                focusedNode.getWorldPosition(worldPos);
                targetPos.lerp(worldPos.clone().add(new THREE.Vector3(0, 0, 6)), 0.1);
                targetLookAt.lerp(worldPos, 0.1);
            }
            targetPos.x += cameraOffset.x;
            targetPos.y += cameraOffset.y;
            targetPos.z += cameraOffset.z;
            camera.position.lerp(targetPos, 0.05);
            const lookAt = new THREE.Vector3();
            lookAt.lerp(targetLookAt, 0.05);
            camera.lookAt(lookAt);
        }
        function updateGalaxyNodes(time) {
            galaxyNodes.forEach(node => {
                const data = node.userData;
                
                // 【家庭同步公转】所有家庭同速，相对位置永久固定
                if (data.familyId > 0) {
                    const baseAngleRad = (data.baseAngle + data.offsetAngle) * Math.PI / 180;
                    const rotateAngle = time * data.orbitSpeed;
                    const finalAngle = baseAngleRad + rotateAngle;
                    node.position.x = Math.cos(finalAngle) * data.orbitRadius;
                    node.position.z = Math.sin(finalAngle) * data.orbitRadius;
                }
                // 自转
                node.rotation.y += data.selfRotateSpeed;
                // 呼吸光效
                const breathe = 1 + Math.sin(time * 1.2 + data.baseAngle) * 0.06;
                const baseScale = node === hoveredNode ? 1.4 : 1;
                const targetScale = baseScale * breathe;
                node.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.05);
                // 环旋转动画
                data.innerRing.rotation.z += 0.008;
                data.outerRing.rotation.z -= 0.004;
                data.halo.rotation.y += 0.005;
                // 材质时间更新
                data.material.uniforms.time.value = time;
                data.haloMat.uniforms.time.value = time;
            });
        }
        function updateParticleSystems(time) {
            particleSystems.forEach(sys => {
                if (sys.material && sys.material.uniforms && sys.material.uniforms.time) {
                    sys.material.uniforms.time.value = time;
                }
                if (sys.type === 'vortex') {
                    sys.mesh.rotation.y += 0.001;
                }
                if (sys.type === 'milkyway') {
                    sys.mesh.rotation.z += 0.0002;
                }
            });
        }
        // 工具函数
        function lerp(a, b, t) { return a + (b - a) * t; }
        function easeInOutQuart(t) {
            return t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t;
        }
        window.onload = init;
    </script>
</body>
