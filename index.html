<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开心聚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none; /* 禁用浏览器默认触摸行为，避免卡顿 */
        }
        body {
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #fff;
            -webkit-overflow-scrolling: touch;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* UI 样式 */
        #header {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        #header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            background: linear-gradient(90deg, #d4af37, #f5e6c8, #d4af37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        #hover-label {
            position: fixed;
            pointer-events: none;
            z-index: 101;
            font-size: 18px;
            font-weight: 400;
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(212, 175, 55, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(212, 175, 55, 0.3);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #scroll-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
            animation: bounce 2s infinite;
        }
        #mobile-hint {
            position: fixed;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            display: none;
        }
        @media (hover: none) {
            #mobile-hint { display: block; }
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
            40% { transform: translateX(-50%) translateY(-10px); }
            60% { transform: translateX(-50%) translateY(-5px); }
        }
        /* 管理面板样式 */
        #admin-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
            min-width: 60px;
            min-height: 36px;
        }
        #admin-btn:hover { background: rgba(255,255,255,0.2); }
        #admin-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 320px;
            max-width: 100vw;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 103;
            padding: 20px;
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #admin-panel.open { right: 0; }
        #admin-panel h2 {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .upload-section { margin-bottom: 20px; }
        .upload-section label {
            display: block;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
        }
        .upload-section select,
        .upload-section input[type="file"] {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 10px;
            min-height: 40px;
        }
        .upload-btn {
            width: 100%;
            background: linear-gradient(90deg, #d4af37, #b8941f);
            border: none;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
        }
        .upload-btn:hover { transform: scale(1.02); }
        .close-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            width: 30px;
            height: 30px;
            line-height: 30px;
            text-align: center;
        }
        .close-panel:hover { opacity: 1; }
        /* 音乐控制 */
        #music-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 102;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s ease;
        }
        #music-btn:hover { background: rgba(255,255,255,0.2); }
        #music-btn.playing { background: rgba(212, 175, 55, 0.3); border-color: #d4af37; }
        /* 加载动画 */
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .loader {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(212, 175, 55, 0.3);
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading-text {
            margin-top: 20px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            letter-spacing: 2px;
        }
        /* 进度指示器 */
        #progress-indicator {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .progress-dot.active {
            background: #d4af37;
            transform: scale(1.5);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }
        /* 照片预览弹窗 */
        #photo-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 300;
            display: none;
            justify-content: center;
            align-items: center;
        }
        #photo-modal.open { display: flex; }
        #photo-modal img {
            max-width: 90%;
            max-height: 70%;
            border-radius: 12px;
            border: 2px solid rgba(212, 175, 55, 0.5);
        }
        #photo-modal .close-modal {
            position: absolute;
            top: 30px;
            right: 30px;
            background: none;
            border: none;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }
        #photo-modal .close-modal:hover { opacity: 1; }
        #photo-modal .modal-name {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            color: #d4af37;
            font-weight: 300;
            letter-spacing: 2px;
            text-align: center;
            width: 90%;
        }
        /* 错误提示 */
        #error-tip {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 300;
            text-align: center;
            display: none;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="header"><h1>开心聚</h1></div>
    <div id="hover-label"></div>
    <div id="scroll-hint">滑动探索</div>
    <div id="mobile-hint">单指滑动旋转 · 双指缩放 · 点击查看</div>
    
    <button id="music-btn">♪</button>
    <button id="admin-btn">管理</button>
    
    <!-- 管理面板 -->
    <div id="admin-panel">
        <button class="close-panel">&times;</button>
        <h2>家族管理</h2>
        <div class="upload-section">
            <label>上传成员照片</label>
            <select id="member-select"></select>
            <input type="file" id="photo-input" accept="image/jpeg,image/png,image/jpg">
            <button class="upload-btn" id="upload-photo-btn">上传照片</button>
        </div>
        <div class="upload-section">
            <label>上传背景音乐</label>
            <input type="file" id="audio-input" accept="audio/mp3,audio/wav,audio/m4a,audio/mpeg">
            <button class="upload-btn" id="upload-audio-btn">上传音乐</button>
            <p style="font-size:12px; color:rgba(255,255,255,0.5); margin-top:8px;">支持mp3/wav/m4a格式，大小不超过10MB</p>
        </div>
    </div>
    
    <!-- 进度指示器 -->
    <div id="progress-indicator"></div>
    
    <!-- 加载页 -->
    <div id="loading">
        <div class="loader"></div>
        <div id="loading-text">加载中...</div>
    </div>

    <!-- 错误提示 -->
    <div id="error-tip">
        <h2>加载失败</h2>
        <p id="error-text">请更换Chrome/Edge/微信内置浏览器重试</p>
    </div>

    <!-- 照片预览弹窗 -->
    <div id="photo-modal">
        <button class="close-modal">&times;</button>
        <img id="modal-photo" src="" alt="成员照片">
        <div class="modal-name" id="modal-name"></div>
    </div>
    
    <!-- 背景音乐 -->
    <audio id="bgm" loop preload="auto">

    <!-- 稳定CDN资源 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script>
        // 桌面端才加载后处理依赖，移动端跳过，减少加载时间
        if(!('ontouchstart' in window)) {
            document.write('<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"><\/script>');
            document.write('<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"><\/script>');
            document.write('<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"><\/script>');
            document.write('<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"><\/script>');
            document.write('<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"><\/script>');
        }
    </script>

    <script>
        // 全局错误捕获
        window.onerror = function(message, source, lineno, colno, error) {
            document.getElementById('loading-text').textContent = '加载出错';
            document.getElementById('error-tip').style.display = 'block';
            document.getElementById('error-text').textContent = `错误：${message}`;
            console.error('页面错误：', message, error);
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
            }, 1000);
        }

        // 环境检测
        const isMobile = 'ontouchstart' in window || navigator.userAgent.includes('Mobile');
        const pixelRatio = Math.min(window.devicePixelRatio, isMobile ? 1.5 : 2); // 移动端限制像素比
        const segmentCount = isMobile ? 32 : 128; // 几何体精度，移动端降低
        const particleCount = isMobile ? 1000 : 4000; // 粒子数量，移动端精简

        // 家庭配置
        const familyConfig = {
            1: { name: '田延芝家庭', color: '#d4af37', baseAngle: 0 },
            2: { name: '田延英家庭', color: '#e27d48', baseAngle: 90 },
            3: { name: '田延兰家庭', color: '#48a79c', baseAngle: 180 },
            4: { name: '田玉莲家庭', color: '#8d5fc9', baseAngle: 270 }
        };

        // 家族成员数据
        const familyData = [
            { 
                id: 'core', 
                name: '张明菊', 
                level: 0, 
                color: '#f8e0a0', 
                isCore: true,
                familyId: 0,
                orbitRadius: 0,
                baseAngle: 0
            },
            // 家庭1
            { 
                id: 'tianyanzhi', 
                name: '田延芝', 
                level: 1, 
                color: familyConfig[1].color, 
                parentId: 'core',
                isMother: true,
                familyId: 1,
                orbitRadius: 18,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanxiaowei', 
                name: '谭小伟', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 30,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: -3
            },
            { 
                id: 'tanxiaoping', 
                name: '谭晓萍', 
                level: 2, 
                color: familyConfig[1].color, 
                motherId: 'tianyanzhi',
                fatherId: null,
                familyId: 1,
                orbitRadius: 30,
                baseAngle: familyConfig[1].baseAngle,
                offsetAngle: 3
            },
            // 家庭2
            { 
                id: 'tianyanying', 
                name: '田延英', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: 'core',
                isMother: true,
                familyId: 2,
                orbitRadius: 18,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanyuangui', 
                name: '谭元贵', 
                level: 1, 
                color: familyConfig[2].color, 
                parentId: null,
                isFather: true,
                familyId: 2,
                orbitRadius: 18,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanjunna', 
                name: '谭畯娜', 
                level: 2, 
                color: familyConfig[2].color, 
                motherId: 'tianyanying',
                fatherId: 'tanyuangui',
                familyId: 2,
                orbitRadius: 30,
                baseAngle: familyConfig[2].baseAngle,
                offsetAngle: 0
            },
            // 家庭3
            { 
                id: 'tianyanlan', 
                name: '田延兰', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: 'core',
                isMother: true,
                familyId: 3,
                orbitRadius: 18,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'chenhongshun', 
                name: '陈洪顺', 
                level: 1, 
                color: familyConfig[3].color, 
                parentId: null,
                isFather: true,
                familyId: 3,
                orbitRadius: 18,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'chensiyu', 
                name: '陈思昱', 
                level: 2, 
                color: familyConfig[3].color, 
                motherId: 'tianyanlan',
                fatherId: 'chenhongshun',
                familyId: 3,
                orbitRadius: 30,
                baseAngle: familyConfig[3].baseAngle,
                offsetAngle: 0
            },
            // 家庭4
            { 
                id: 'tianyulian', 
                name: '田玉莲', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: 'core',
                isMother: true,
                familyId: 4,
                orbitRadius: 18,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: -5
            },
            { 
                id: 'tanshuai', 
                name: '谭帅', 
                level: 1, 
                color: familyConfig[4].color, 
                parentId: null,
                isFather: true,
                familyId: 4,
                orbitRadius: 18,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 5
            },
            { 
                id: 'tanxinmiao', 
                name: '谭鑫淼', 
                level: 2, 
                color: familyConfig[4].color, 
                motherId: 'tianyulian',
                fatherId: 'tanshuai',
                familyId: 4,
                orbitRadius: 30,
                baseAngle: familyConfig[4].baseAngle,
                offsetAngle: 0
            },
        ];

        // 相机关键帧
        const cameraKeyframes = [
            { position: [0, 0, 55], lookAt: [0, 0, 0], name: '全景' },
            { position: [0, 0, 38], lookAt: [0, 0, 0], name: '核心' },
            { position: [22, 12, 28], lookAt: [0, 0, 0], name: '二代' },
            { position: [35, 18, 22], lookAt: [18, 0, 0], name: '三代' },
        ];

        // 全局变量
        let scene, camera, renderer, composer;
        let galaxyNodes = new Map();
        let relationLines = [];
        let orbitRings = [];
        let particleSystems = [];
        let hoveredNode = null;
        let focusedNode = null;
        let progress = 0;
        let targetProgress = 0;
        let isDragging = false;
        let isRightDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        // 【核心优化】移动端滑动惯性参数
        let cameraOffset = { x: 0, y: 0, z: 0 };
        let velocity = { x: 0, y: 0, z: 0 };
        let isInerting = false;
        let touchStartDistance = 0;
        let isPostProcessingAvailable = !isMobile; // 移动端关闭后处理
        let textureLoader = new THREE.TextureLoader();
        let lastTime = Date.now();
        let frameCount = 0;

        // ==================== 初始化 ====================
        function init() {
            try {
                scene = new THREE.Scene();
                scene.fog = new THREE.FogExp2(0x000000, isMobile ? 0.02 : 0.015);

                camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
                camera.position.set(...cameraKeyframes[0].position);

                renderer = new THREE.WebGLRenderer({ 
                    antialias: !isMobile, // 移动端关闭抗锯齿，大幅提升性能
                    alpha: true,
                    failIfMajorPerformanceCaveat: false,
                    powerPreference: isMobile ? "low-power" : "high-performance"
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(pixelRatio);
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = isMobile ? 1.0 : 1.3;
                document.getElementById('canvas-container').appendChild(renderer.domElement);

                // 桌面端才初始化后处理
                if (isPostProcessingAvailable && typeof THREE.EffectComposer !== 'undefined') {
                    try {
                        initPostProcessing();
                    } catch (e) {
                        console.warn('后处理加载失败，已降级', e);
                        isPostProcessingAvailable = false;
                    }
                }

                // 创建场景内容
                createOrbitRings();
                createGalaxyHierarchy();
                createRelationLines();
                createParticleSystems();
                !isMobile && createMilkyWay(); // 移动端关闭银河背景，提升性能

                // 事件&UI初始化
                initEvents();
                initUI();
                loadSavedData();
                initProgressIndicator();

                // 隐藏加载页
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                }, 800);

                animate();
            } catch (initError) {
                console.error('初始化失败', initError);
                window.onerror('初始化3D场景失败', '', 0, 0, initError);
            }
        }

        // 后处理初始化（仅桌面端）
        function initPostProcessing() {
            composer = new THREE.EffectComposer(renderer);
            const renderPass = new THREE.RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new THREE.UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.6, 0.05, 0.8
            );
            bloomPass.threshold = 0.05;
            bloomPass.strength = 1.6;
            bloomPass.radius = 0.8;
            composer.addPass(bloomPass);
        }

        // 轨道环创建
        function createOrbitRings() {
            // 二代轨道环
            const level1RingGeo = new THREE.RingGeometry(17.5, 18.5, segmentCount);
            const level1RingMat = new THREE.MeshBasicMaterial({
                color: 0xd4af37,
                transparent: true,
                opacity: isMobile ? 0.1 : 0.12,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const level1Ring = new THREE.Mesh(level1RingGeo, level1RingMat);
            level1Ring.rotation.x = Math.PI / 2;
            scene.add(level1Ring);
            orbitRings.push(level1Ring);

            // 三代轨道环
            const level2RingGeo = new THREE.RingGeometry(29.5, 30.5, segmentCount);
            const level2RingMat = new THREE.MeshBasicMaterial({
                color: 0xf0d78c,
                transparent: true,
                opacity: isMobile ? 0.06 : 0.08,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const level2Ring = new THREE.Mesh(level2RingGeo, level2RingMat);
            level2Ring.rotation.x = Math.PI / 2;
            scene.add(level2Ring);
            orbitRings.push(level2Ring);
        }

        // 星系层级创建
        function createGalaxyHierarchy() {
            const maxLevel = Math.max(...familyData.map(m => m.level));
            for (let level = 0; level <= maxLevel; level++) {
                const levelMembers = familyData.filter(m => m.level === level);
                levelMembers.forEach(member => {
                    createGalaxyNode(member);
                });
            }
        }

        // 星体创建（移动端简化Shader）
        function createGalaxyNode(member) {
            const group = new THREE.Group();
            
            // 球体大小按辈分区分
            let sphereRadius;
            switch(member.level) {
                case 0: sphereRadius = 1.8; break;
                case 1: sphereRadius = 1.1; break;
                case 2: sphereRadius = 0.8; break;
                default: sphereRadius = 0.8;
            }
            const geometry = new THREE.SphereGeometry(sphereRadius, segmentCount, segmentCount);

            // 【移动端简化Shader】移除耗性能的噪声计算
            const fragmentShader = isMobile ? `
                uniform vec3 baseColor;
                uniform vec3 coreColor;
                uniform float time;
                uniform float glowIntensity;
                uniform float hoverIntensity;
                uniform sampler2D photoTexture;
                uniform float hasPhoto;
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;
                varying float vFresnel;

                void main() {
                    float distFromCenter = length(vPosition);
                    float coreGradient = 1.0 - smoothstep(0.0, 1.0, distFromCenter);
                    vec3 base = mix(baseColor, coreColor, coreGradient * 0.8);

                    if (hasPhoto > 0.5) {
                        vec4 photoColor = texture2D(photoTexture, vUv);
                        base = mix(base, photoColor.rgb, 0.85);
                    }

                    float innerFresnel = pow(vFresnel, 1.2);
                    float outerFresnel = pow(vFresnel, 0.6);
                    vec3 fresnelGlow = innerFresnel * coreColor * (1.0 + hoverIntensity * 2.0);
                    vec3 outerGlow = outerFresnel * baseColor * (glowIntensity + hoverIntensity);
                    
                    vec3 finalColor = base + fresnelGlow + outerGlow;
                    float alpha = 1.0 + outerFresnel * 0.5;
                    gl_FragColor = vec4(finalColor, alpha);
                }
            ` : `
                uniform vec3 baseColor;
                uniform vec3 coreColor;
                uniform float time;
                uniform float glowIntensity;
                uniform float hoverIntensity;
                uniform sampler2D photoTexture;
                uniform float hasPhoto;
                varying vec3 vNormal;
                varying vec3 vPosition;
                varying vec2 vUv;
                varying float vFresnel;

                float noise(vec2 p) {
                    return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                }

                void main() {
                    float distFromCenter = length(vPosition);
                    float coreGradient = 1.0 - smoothstep(0.0, 1.0, distFromCenter);
                    vec3 base = mix(baseColor, coreColor, coreGradient * 0.8);

                    vec2 noiseUv = vUv * 3.0 + vec2(time * 0.1, time * 0.05);
                    float surfaceNoise = noise(noiseUv) * 0.15;
                    base += surfaceNoise * baseColor;

                    if (hasPhoto > 0.5) {
                        vec4 photoColor = texture2D(photoTexture, vUv);
                        base = mix(base, photoColor.rgb, 0.85);
                    }

                    float innerFresnel = pow(vFresnel, 1.2);
                    float outerFresnel = pow(vFresnel, 0.6);
                    vec3 fresnelGlow = innerFresnel * coreColor * (1.0 + hoverIntensity * 2.0);
                    vec3 outerGlow = outerFresnel * baseColor * (glowIntensity + hoverIntensity);
                    
                    vec3 finalColor = base + fresnelGlow + outerGlow;
                    float alpha = 1.0 + outerFresnel * 0.5;
                    gl_FragColor = vec4(finalColor, alpha);
                }
            `;

            // 材质创建
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    baseColor: { value: new THREE.Color(member.color) },
                    coreColor: { value: new THREE.Color(member.isCore ? '#ffffff' : '#fff8e6') },
                    time: { value: 0 },
                    glowIntensity: { value: member.isCore ? 1.0 : 0.6 },
                    hoverIntensity: { value: 0.0 },
                    photoTexture: { value: null },
                    hasPhoto: { value: 0 }
                },
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    varying vec2 vUv;
                    varying float vFresnel;
                    
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        vUv = uv;
                        vFresnel = pow(1.0 - abs(dot(vNormal, vec3(0.0, 0.0, 1.0))), 2.0);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: fragmentShader,
                transparent: true,
                side: THREE.FrontSide
            });

            const sphere = new THREE.Mesh(geometry, material);
            group.add(sphere);

            // 双层发光环
            const innerRingGeo = new THREE.RingGeometry(
                sphereRadius * 1.3, 
                sphereRadius * 1.5, 
                segmentCount
            );
            const innerRingMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(member.color),
                transparent: true,
                opacity: member.isCore ? 0.35 : 0.25,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
            innerRing.rotation.x = Math.PI / 2;
            group.add(innerRing);

            const outerRingGeo = new THREE.RingGeometry(
                sphereRadius * 1.8, 
                sphereRadius * 2.2, 
                segmentCount
            );
            const outerRingMat = new THREE.MeshBasicMaterial({
                color: new THREE.Color(member.color),
                transparent: true,
                opacity: member.isCore ? 0.15 : 0.1,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });
            const outerRing = new THREE.Mesh(outerRingGeo, outerRingMat);
            outerRing.rotation.x = Math.PI / 2;
            group.add(outerRing);

            // 粒子光晕（移动端精简数量）
            const haloCount = isMobile 
                ? (member.isCore ? 100 : member.level === 1 ? 60 : 40)
                : (member.isCore ? 200 : member.level === 1 ? 120 : 80);
            const haloGeo = new THREE.BufferGeometry();
            const haloPositions = new Float32Array(haloCount * 3);
            const haloSizes = new Float32Array(haloCount);
            for (let i = 0; i < haloCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = sphereRadius * 2.2 + Math.random() * 1.2;
                haloPositions[i * 3] = Math.cos(angle) * radius;
                haloPositions[i * 3 + 1] = (Math.random() - 0.5) * 0.6;
                haloPositions[i * 3 + 2] = Math.sin(angle) * radius;
                haloSizes[i] = 0.04 + Math.random() * 0.06;
            }
            haloGeo.setAttribute('position', new THREE.BufferAttribute(haloPositions, 3));
            haloGeo.setAttribute('size', new THREE.BufferAttribute(haloSizes, 1));
            const haloMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 }, color: { value: new THREE.Color(member.color) } },
                vertexShader: `
                    attribute float size;
                    uniform float time;
                    varying float vAlpha;
                    void main() {
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float twinkle = sin(time * 2.0 + position.x * 10.0) * 0.5 + 0.5;
                        gl_PointSize = size * (300.0 / -mvPosition.z) * twinkle;
                        vAlpha = 0.4 + twinkle * 0.6;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform vec3 color;
                    varying float vAlpha;
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                        gl_FragColor = vec4(color, alpha * vAlpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            const halo = new THREE.Points(haloGeo, haloMat);
            group.add(halo);

            // 位置计算
            if (member.isCore) {
                group.position.set(0, 0, 0);
            } else {
                const baseAngleRad = (member.baseAngle + member.offsetAngle) * Math.PI / 180;
                group.position.set(
                    Math.cos(baseAngleRad) * member.orbitRadius,
                    (Math.random() - 0.5) * (member.level === 1 ? 1.5 : 2),
                    Math.sin(baseAngleRad) * member.orbitRadius
                );
            }

            // 节点数据存储
            group.userData = {
                ...member,
                material,
                sphere,
                innerRing,
                outerRing,
                halo,
                haloMat,
                sphereRadius,
                originalScale: 1,
                orbitSpeed: member.familyId === 0 ? 0 : 0.05 + member.familyId * 0.01,
                selfRotateSpeed: isMobile 
                    ? (member.isCore ? 0.001 : member.level === 1 ? 0.002 : 0.003)
                    : (member.isCore ? 0.002 : member.level === 1 ? 0.004 : 0.006)
            };

            scene.add(group);
            galaxyNodes.set(member.id, group);
        }

        // 连线创建
        function createRelationLines() {
            const coreNode = galaxyNodes.get('core');
            // 祖辈仅连女儿
            familyData.filter(m => m.level === 1 && m.isMother).forEach(member => {
                const daughterNode = galaxyNodes.get(member.id);
                createLine(coreNode, daughterNode, member.color);
            });
            // 孙辈连父母
            familyData.filter(m => m.level === 2).forEach(member => {
                const childNode = galaxyNodes.get(member.id);
                if (member.motherId) {
                    const motherNode = galaxyNodes.get(member.motherId);
                    if (motherNode) createLine(motherNode, childNode, member.color);
                }
                if (member.fatherId) {
                    const fatherNode = galaxyNodes.get(member.fatherId);
                    if (fatherNode) createLine(fatherNode, childNode, member.color);
                }
            });
        }

        function createLine(startNode, endNode, color) {
            const lineGeo = new THREE.BufferGeometry();
            lineGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(6), 3));
            const lineMat = new THREE.LineBasicMaterial({
                color: new THREE.Color(color),
                transparent: true,
                opacity: 0.35,
                blending: THREE.AdditiveBlending
            });
            const line = new THREE.Line(lineGeo, lineMat);
            line.userData = { startNode, endNode };
            scene.add(line);
            relationLines.push(line);
        }

        // 连线更新（移动端降低频率）
        function updateRelationLines() {
            if (isMobile && frameCount % 2 !== 0) return; // 移动端每2帧更新一次
            relationLines.forEach(line => {
                const { startNode, endNode } = line.userData;
                const startPos = startNode.position;
                const endPos = endNode.position;
                
                const positions = line.geometry.attributes.position.array;
                positions[0] = startPos.x;
                positions[1] = startPos.y;
                positions[2] = startPos.z;
                positions[3] = endPos.x;
                positions[4] = endPos.y;
                positions[5] = endPos.z;
                line.geometry.attributes.position.needsUpdate = true;
            });
        }

        // 粒子系统创建（移动端精简）
        function createParticleSystems() {
            const starGeo = new THREE.BufferGeometry();
            const starPositions = new Float32Array(particleCount * 3);
            const starColors = new Float32Array(particleCount * 3);
            const starSizes = new Float32Array(particleCount);

            for (let i = 0; i < particleCount; i++) {
                const radius = 150 + Math.random() * 250;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                
                starPositions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
                starPositions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
                starPositions[i * 3 + 2] = radius * Math.cos(phi);

                const color = new THREE.Color();
                color.setHSL(0.1 + Math.random() * 0.15, 0.5, 0.7 + Math.random() * 0.3);
                starColors[i * 3] = color.r;
                starColors[i * 3 + 1] = color.g;
                starColors[i * 3 + 2] = color.b;

                starSizes[i] = Math.random() * 3;
            }

            starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
            starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

            const starMat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    uniform float time;
                    void main() {
                        vColor = color;
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        float twinkle = sin(time * 1.2 + position.x * 3.0) * 0.5 + 0.5;
                        gl_PointSize = size * (300.0 / -mvPosition.z) * (0.7 + twinkle * 0.5);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        float dist = length(gl_PointCoord - vec2(0.5));
                        if (dist > 0.5) discard;
                        float alpha = 1.0 - smoothstep(0.0, 0.5, dist);
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending
            });

            const stars = new THREE.Points(starGeo, starMat);
            scene.add(stars);
            particleSystems.push({ mesh: stars, material: starMat, type: 'stars' });

            // 移动端关闭涡旋粒子
            if (!isMobile) {
                const vortexGeo = new THREE.BufferGeometry();
                const vortexCount = 300;
                const vortexPositions = new Float32Array(vortexCount * 3);
                const vortexColors = new Float32Array(vortexCount * 3);

                for (let i = 0; i < vortexCount; i++) {
                    const t = i / vortexCount;
                    const angle = t * Math.PI * 12;
                    const radius = t * 40;
                    vortexPositions[i * 3] = Math.cos(angle) * radius;
                    vortexPositions[i * 3 + 1] = (t - 0.5) * 20;
                    vortexPositions[i * 3 + 2] = Math.sin(angle) * radius;

                    const color = new THREE.Color();
                    color.setHSL(0.1, 0.6, 0.5 + t * 0.3);
                    vortexColors[i * 3] = color.r;
                    vortexColors[i * 3 + 1] = color.g;
                    vortexColors[i * 3 + 2] = color.b;
                }

                vortexGeo.setAttribute('position', new THREE.BufferAttribute(vortexPositions, 3));
                vortexGeo.setAttribute('color', new THREE.BufferAttribute(vortexColors, 3));

                const vortexMat = new THREE.PointsMaterial({
                    size: 0.15,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.6,
                    blending: THREE.AdditiveBlending
                });

                const vortex = new THREE.Points(vortexGeo, vortexMat);
                scene.add(vortex);
                particleSystems.push({ mesh: vortex, type: 'vortex' });
            }
        }

        // 银河背景（仅桌面端）
        function createMilkyWay() {
            const geo = new THREE.PlaneGeometry(600, 600, segmentCount, segmentCount);
            const mat = new THREE.ShaderMaterial({
                uniforms: { time: { value: 0 } },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    void main() {
                        vUv = uv;
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    varying vec2 vUv;
                    varying vec3 vPosition;
                    
                    float noise(vec2 p) {
                        return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
                    }
                    
                    void main() {
                        vec2 center = vUv - 0.5;
                        float dist = length(center);
                        float ring = smoothstep(0.7, 0.0, dist) * smoothstep(0.1, 0.3, dist);
                        
                        float n = noise(vUv * 6.0 + time * 0.003);
                        vec3 color = vec3(0.9, 0.8, 0.5) * ring * (0.3 + n * 0.7);
                        float alpha = ring * 0.2;
                        
                        gl_FragColor = vec4(color, alpha);
                    }
                `,
                transparent: true,
                side: THREE.DoubleSide,
                blending: THREE.AdditiveBlending
            });

            const milkyWay = new THREE.Mesh(geo, mat);
            milkyWay.rotation.x = Math.PI / 3;
            scene.add(milkyWay);
            particleSystems.push({ mesh: milkyWay, material: mat, type: 'milkyway' });
        }

        // ==================== 【核心重写】事件监听（移动端优化）====================
        function initEvents() {
            window.addEventListener('resize', onWindowResize);

            // 桌面端鼠标事件
            if (!isMobile) {
                renderer.domElement.addEventListener('mousemove', onMouseMove);
                renderer.domElement.addEventListener('mousedown', onMouseDown);
                renderer.domElement.addEventListener('mouseup', onMouseUp);
                renderer.domElement.addEventListener('wheel', onWheel, { passive: false });
                renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
            }

            // 【重写】移动端触摸事件
            if (isMobile) {
                renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });
                renderer.domElement.addEventListener('touchmove', onTouchMove, { passive: false });
                renderer.domElement.addEventListener('touchend', onTouchEnd, { passive: false });
                renderer.domElement.addEventListener('touchcancel', onTouchEnd, { passive: false });
            }

            // 弹窗关闭事件
            document.querySelector('#photo-modal .close-modal').onclick = () => {
                document.getElementById('photo-modal').classList.remove('open');
            };
            document.getElementById('photo-modal').onclick = (e) => {
                if (e.target === document.getElementById('photo-modal')) {
                    document.getElementById('photo-modal').classList.remove('open');
                }
            };
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            if (isPostProcessingAvailable && composer) {
                composer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        // 桌面端鼠标事件
        function onMouseMove(e) {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                cameraOffset.x += deltaX * 0.01;
                cameraOffset.y -= deltaY * 0.01;
                velocity.x = deltaX * 0.01;
                velocity.y = -deltaY * 0.01;
            } else if (isRightDragging) {
                const deltaY = e.clientY - previousMousePosition.y;
                cameraOffset.z += deltaY * 0.05;
                velocity.z = deltaY * 0.05;
            } else {
                const mouse = new THREE.Vector2(
                    (e.clientX / window.innerWidth) * 2 - 1,
                    -(e.clientY / window.innerHeight) * 2 + 1
                );
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
                const intersects = raycaster.intersectObjects(allSpheres);

                if (intersects.length > 0) {
                    const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                    if (node && node !== hoveredNode) {
                        if (hoveredNode) resetNodeHover(hoveredNode);
                        hoveredNode = node;
                        setNodeHover(node);
                    }
                    document.body.style.cursor = 'pointer';
                } else {
                    if (hoveredNode) {
                        resetNodeHover(hoveredNode);
                        hoveredNode = null;
                    }
                    document.body.style.cursor = 'grab';
                }

                updateHoverLabel(e.clientX, e.clientY);
            }

            previousMousePosition = { x: e.clientX, y: e.clientY };
        }

        function onMouseDown(e) {
            if (e.button === 0) isDragging = true;
            if (e.button === 2) isRightDragging = true;
            document.body.style.cursor = e.button === 0 ? 'grabbing' : 'ew-resize';
            previousMousePosition = { x: e.clientX, y: e.clientY };
            velocity = { x: 0, y: 0, z: 0 };
            isInerting = false;
        }

        function onMouseUp(e) {
            if (e.button === 0) {
                isDragging = false;
                isInerting = true; // 开启惯性
                if (hoveredNode && Math.abs(velocity.x) < 0.1 && Math.abs(velocity.y) < 0.1) {
                    focusedNode = focusedNode === hoveredNode ? null : hoveredNode;
                    openPhotoModal(hoveredNode);
                }
            }
            if (e.button === 2) {
                isRightDragging = false;
                isInerting = true;
            }
            document.body.style.cursor = hoveredNode ? 'pointer' : 'grab';
        }

        function onWheel(e) {
            e.preventDefault();
            targetProgress += e.deltaY * 0.001;
            targetProgress = Math.max(0, Math.min(targetProgress, cameraKeyframes.length - 1));
        }

        // ==================== 【核心重写】移动端触摸事件 ====================
        let touchStartX = 0, touchStartY = 0;
        let touchStartTime = 0;
        function onTouchStart(e) {
            e.preventDefault();
            touchStartTime = Date.now();
            velocity = { x: 0, y: 0, z: 0 };
            isInerting = false;
            isDragging = false;

            if (e.touches.length === 1) {
                // 单指触摸
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                previousMousePosition = { x: touchStartX, y: touchStartY };
            } else if (e.touches.length === 2) {
                // 双指缩放
                touchStartDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
            }
        }

        function onTouchMove(e) {
            e.preventDefault();
            isDragging = true;

            if (e.touches.length === 1) {
                // 单指滑动旋转
                const currentX = e.touches[0].clientX;
                const currentY = e.touches[0].clientY;
                const deltaX = currentX - previousMousePosition.x;
                const deltaY = currentY - previousMousePosition.y;
                
                // 【核心优化】移动端灵敏度提升3倍
                const sensitivity = 0.03;
                cameraOffset.x += deltaX * sensitivity;
                cameraOffset.y -= deltaY * sensitivity;
                
                // 记录速度，用于惯性
                velocity.x = deltaX * sensitivity;
                velocity.y = -deltaY * sensitivity;

                previousMousePosition = { x: currentX, y: currentY };
            } else if (e.touches.length === 2) {
                // 双指缩放
                const currentDistance = Math.hypot(
                    e.touches[0].clientX - e.touches[1].clientX,
                    e.touches[0].clientY - e.touches[1].clientY
                );
                const delta = currentDistance - touchStartDistance;
                // 缩放灵敏度优化
                cameraOffset.z -= delta * 0.02;
                velocity.z = -delta * 0.02;
                touchStartDistance = currentDistance;
            }
        }

        function onTouchEnd(e) {
            e.preventDefault();
            const touchEndTime = Date.now();
            const touchDuration = touchEndTime - touchStartTime;
            const touchEndX = e.changedTouches[0]?.clientX || 0;
            const touchEndY = e.changedTouches[0]?.clientY || 0;
            const deltaMove = Math.hypot(touchEndX - touchStartX, touchEndY - touchStartY);
            
            isDragging = false;
            isInerting = true; // 开启滑动惯性

            // 点击判断：短时间+小移动距离，判定为点击
            if (touchDuration < 300 && deltaMove < 15) {
                // 射线检测点击的星球
                const mouse = new THREE.Vector2(
                    (touchEndX / window.innerWidth) * 2 - 1,
                    -(touchEndY / window.innerHeight) * 2 + 1
                );
                const raycaster = new THREE.Raycaster();
                raycaster.setFromCamera(mouse, camera);
                const allSpheres = Array.from(galaxyNodes.values()).map(g => g.userData.sphere);
                const intersects = raycaster.intersectObjects(allSpheres);

                if (intersects.length > 0) {
                    const node = Array.from(galaxyNodes.values()).find(g => g.userData.sphere === intersects[0].object);
                    if (node) {
                        focusedNode = focusedNode === node ? null : node;
                        openPhotoModal(node);
                    }
                }
            }
        }

        // ==================== 节点交互 ====================
        function setNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 1.8 : 1.4;
            data.material.uniforms.hoverIntensity.value = 1.0;
            data.innerRing.material.opacity = data.isCore ? 0.6 : 0.5;
            data.outerRing.material.opacity = data.isCore ? 0.3 : 0.25;
            node.scale.lerp(new THREE.Vector3(1.4, 1.4, 1.4), 0.1);
        }

        function resetNodeHover(node) {
            const data = node.userData;
            data.material.uniforms.glowIntensity.value = data.isCore ? 1.0 : 0.6;
            data.material.uniforms.hoverIntensity.value = 0.0;
            data.innerRing.material.opacity = data.isCore ? 0.35 : 0.25;
            data.outerRing.material.opacity = data.isCore ? 0.15 : 0.1;
            node.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
        }

        function updateHoverLabel(x, y) {
            const label = document.getElementById('hover-label');
            if (hoveredNode) {
                label.textContent = hoveredNode.userData.name;
                // 移动端标签防溢出
                const labelWidth = 100;
                const windowWidth = window.innerWidth;
                const finalX = x + 15 + labelWidth > windowWidth ? x - labelWidth - 15 : x + 15;
                label.style.left = finalX + 'px';
                label.style.top = y - 10 + 'px';
                label.style.background = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.15)`;
                label.style.borderColor = `rgba(${hexToRgb(hoveredNode.userData.color)}, 0.3)`;
                label.style.opacity = '1';
            } else {
                label.style.opacity = '0';
            }
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function openPhotoModal(node) {
            const data = node.userData;
            const savedPhoto = localStorage.getItem(`photo_${data.id}`);
            if (!savedPhoto) {
                alert('该成员暂未上传照片，可点击右上角「管理」按钮上传');
                return;
            }
            document.getElementById('modal-photo').src = savedPhoto;
            document.getElementById('modal-name').textContent = data.name;
            document.getElementById('photo-modal').classList.add('open');
        }

        // ==================== UI&上传功能 ====================
        function initUI() {
            // 管理面板开关
            const adminBtn = document.getElementById('admin-btn');
            const adminPanel = document.getElementById('admin-panel');
            const closePanel = document.querySelector('.close-panel');
            
            adminBtn.onclick = () => adminPanel.classList.add('open');
            closePanel.onclick = () => adminPanel.classList.remove('open');

            // 成员下拉框
            const memberSelect = document.getElementById('member-select');
            familyData.forEach(m => {
                const option = document.createElement('option');
                option.value = m.id;
                option.textContent = m.name;
                memberSelect.appendChild(option);
            });

            // 照片上传
            document.getElementById('upload-photo-btn').onclick = uploadPhoto;
            
            // 音乐上传
            document.getElementById('upload-audio-btn').onclick = uploadAudio;

            // 音乐播放控制（移动端兼容）
            const musicBtn = document.getElementById('music-btn');
            const bgm = document.getElementById('bgm');
            
            bgm.onloadeddata = () => console.log('音频加载完成');
            bgm.onerror = (e) => {
                console.error('音频加载失败', e);
                alert('音频文件加载失败，请检查格式');
            };

            // 移动端兼容：点击页面任意位置解锁音频
            document.body.addEventListener('click', () => {
                if (bgm.paused && bgm.src) {
                    bgm.load();
                }
            }, { once: true });

            musicBtn.onclick = () => {
                if (!bgm.src || bgm.src === window.location.href) {
                    alert('请先上传背景音乐');
                    return;
                }
                if (bgm.paused) {
                    bgm.play().then(() => {
                        musicBtn.classList.add('playing');
                        musicBtn.textContent = '♫';
                    }).catch(e => {
                        console.warn('播放失败', e);
                        alert('播放失败，请点击页面后重试');
                    });
                } else {
                    bgm.pause();
                    musicBtn.classList.remove('playing');
                    musicBtn.textContent = '♪';
                }
            };
        }

        function uploadPhoto() {
            const file = document.getElementById('photo-input').files[0];
            const memberId = document.getElementById('member-select').value;
            if (!file || !memberId) {
                alert('请选择成员和照片');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('照片不能超过5MB');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem(`photo_${memberId}`, dataUrl);
                updateNodePhotoTexture(memberId, dataUrl);
                alert('上传成功！点击星球即可查看');
                document.getElementById('photo-input').value = '';
            };
            reader.onerror = () => alert('读取失败，请重试');
            reader.readAsDataURL(file);
        }

        function updateNodePhotoTexture(memberId, photoUrl) {
            const node = galaxyNodes.get(memberId);
            if (!node) return;
            
            textureLoader.load(
                photoUrl,
                (texture) => {
                    texture.colorSpace = THREE.SRGBColorSpace;
                    node.userData.material.uniforms.photoTexture.value = texture;
                    node.userData.material.uniforms.hasPhoto.value = 1;
                    node.userData.material.needsUpdate = true;
                },
                undefined,
                (err) => console.error('纹理加载失败', err)
            );
        }

        function uploadAudio() {
            const file = document.getElementById('audio-input').files[0];
            const bgm = document.getElementById('bgm');
            if (!file) {
                alert('请选择音频文件');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                alert('音频不能超过10MB');
                return;
            }

            const reader = new FileReader();
            reader.onloadstart = () => {
                document.getElementById('upload-audio-btn').textContent = '上传中...';
                document.getElementById('upload-audio-btn').disabled = true;
            };
            reader.onload = (e) => {
                const dataUrl = e.target.result;
                localStorage.setItem('bgm_audio', dataUrl);
                bgm.src = dataUrl;
                bgm.load();
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('上传成功！点击左上角按钮播放');
                document.getElementById('audio-input').value = '';
            };
            reader.onerror = () => {
                document.getElementById('upload-audio-btn').textContent = '上传音乐';
                document.getElementById('upload-audio-btn').disabled = false;
                alert('读取失败，请重试');
            };
            reader.readAsDataURL(file);
        }

        function loadSavedData() {
            const savedAudio = localStorage.getItem('bgm_audio');
            if (savedAudio) {
                document.getElementById('bgm').src = savedAudio;
            }
            familyData.forEach(member => {
                const savedPhoto = localStorage.getItem(`photo_${member.id}`);
                if (savedPhoto) {
                    updateNodePhotoTexture(member.id, savedPhoto);
                }
            });
        }

        // ==================== 进度指示器 ====================
        function initProgressIndicator() {
            const container = document.getElementById('progress-indicator');
            cameraKeyframes.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = 'progress-dot' + (i === 0 ? ' active' : '');
                dot.onclick = () => { targetProgress = i; };
                container.appendChild(dot);
            });
        }

        function updateProgressIndicator() {
            if (isMobile && frameCount % 3 !== 0) return;
            const dots = document.querySelectorAll('.progress-dot');
            const activeIndex = Math.round(progress);
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === activeIndex);
            });
        }

        // ==================== 【核心优化】动画循环（带惯性）====================
        function animate() {
            requestAnimationFrame(animate);
            const currentTime = Date.now();
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            frameCount++;

            const time = currentTime * 0.001;

            // 【核心优化】滑动惯性计算
            if (isInerting) {
                const friction = 0.92; // 摩擦系数，数值越小停的越快
                velocity.x *= friction;
                velocity.y *= friction;
                velocity.z *= friction;
                
                cameraOffset.x += velocity.x;
                cameraOffset.y += velocity.y;
                cameraOffset.z += velocity.z;

                // 速度足够小时停止惯性
                if (Math.abs(velocity.x) < 0.001 && Math.abs(velocity.y) < 0.001 && Math.abs(velocity.z) < 0.001) {
                    isInerting = false;
                    velocity = { x: 0, y: 0, z: 0 };
                }
            }

            // 平滑进度
            progress += (targetProgress - progress) * 0.05;
            // 更新相机
            updateCamera(time);
            // 更新星体动画
            updateGalaxyNodes(time);
            // 更新连线
            updateRelationLines();
            // 更新粒子
            updateParticleSystems(time);
            // 更新进度指示器
            updateProgressIndicator();

            // 渲染
            if (isPostProcessingAvailable && composer) {
                composer.render();
            } else {
                renderer.render(scene, camera);
            }
        }

        function updateCamera(time) {
            const keyIndex = Math.floor(progress);
            const nextIndex = Math.min(keyIndex + 1, cameraKeyframes.length - 1);
            const t = progress - keyIndex;
            const easeT = easeInOutQuart(t);

            const startKey = cameraKeyframes[keyIndex];
            const endKey = cameraKeyframes[nextIndex];

            let targetPos = new THREE.Vector3(
                lerp(startKey.position[0], endKey.position[0], easeT),
                lerp(startKey.position[1], endKey.position[1], easeT),
                lerp(startKey.position[2], endKey.position[2], easeT)
            );

            let targetLookAt = new THREE.Vector3(
                lerp(startKey.lookAt[0], endKey.lookAt[0], easeT),
                lerp(startKey.lookAt[1], endKey.lookAt[1], easeT),
                lerp(startKey.lookAt[2], endKey.lookAt[2], easeT)
            );

            if (focusedNode) {
                const focusPos = focusedNode.position;
                targetPos.lerp(focusPos.clone().add(new THREE.Vector3(0, 0, 6)), 0.1);
                targetLookAt.lerp(focusPos, 0.1);
            }

            // 应用偏移
            targetPos.x += cameraOffset.x;
            targetPos.y += cameraOffset.y;
            targetPos.z += cameraOffset.z;

            // 相机边界限制，防止滑出边界
            targetPos.x = Math.max(-60, Math.min(60, targetPos.x));
            targetPos.y = Math.max(-30, Math.min(30, targetPos.y));
            targetPos.z = Math.max(10, Math.min(80, targetPos.z));

            // 平滑移动
            camera.position.lerp(targetPos, isMobile ? 0.1 : 0.05);
            const lookAt = new THREE.Vector3();
            lookAt.lerp(targetLookAt, isMobile ? 0.1 : 0.05);
            camera.lookAt(lookAt);
        }

        function updateGalaxyNodes(time) {
            galaxyNodes.forEach(node => {
                const data = node.userData;
                
                // 家庭同步公转
                if (data.familyId > 0) {
                    const baseAngleRad = (data.baseAngle + data.offsetAngle) * Math.PI / 180;
                    const rotateAngle = time * data.orbitSpeed;
                    const finalAngle = baseAngleRad + rotateAngle;
                    node.position.x = Math.cos(finalAngle) * data.orbitRadius;
                    node.position.z = Math.sin(finalAngle) * data.orbitRadius;
                }

                // 自转
                node.rotation.y += data.selfRotateSpeed;

                // 呼吸光效
                const breathe = 1 + Math.sin(time * 1.2 + data.baseAngle) * 0.06;
                const baseScale = node === hoveredNode ? 1.4 : 1;
                const targetScale = baseScale * breathe;
                node.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.05);

                // 环旋转
                data.innerRing.rotation.z += 0.008;
                data.outerRing.rotation.z -= 0.004;
                data.halo.rotation.y += 0.005;

                // 材质时间更新
                data.material.uniforms.time.value = time;
                data.haloMat.uniforms.time.value = time;
            });
        }

        function updateParticleSystems(time) {
            if (isMobile && frameCount % 3 !== 0) return; // 移动端每3帧更新一次
            particleSystems.forEach(sys => {
                if (sys.material && sys.material.uniforms && sys.material.uniforms.time) {
                    sys.material.uniforms.time.value = time;
                }
                if (sys.type === 'vortex') {
                    sys.mesh.rotation.y += 0.001;
                }
                if (sys.type === 'milkyway') {
                    sys.mesh.rotation.z += 0.0002;
                }
            });
        }

        // 工具函数
        function lerp(a, b, t) { return a + (b - a) * t; }
        function easeInOutQuart(t) {
            return t < 0.5 ? 8 * t * t * t * t : 1 - 8 * (--t) * t * t * t;
        }

        window.onload = init;
    </script>
</body>
</html>
